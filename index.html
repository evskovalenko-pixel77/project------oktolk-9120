<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0"><title>OkTolk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* OkTolk PWA — design tokens & global styles */

:root {
  /* Set by JS based on tweak palette + theme + cardStyle + radius + fontSize */
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-2: #F5F5F1;
  --surface-tint: #EEF0FF;
  --border: rgba(15, 15, 20, 0.07);
  --border-strong: rgba(15, 15, 20, 0.12);
  --text: #16161A;
  --text-muted: #6B6B72;
  --text-subtle: #9B9BA3;
  --primary: #3B4FE0;
  --primary-hover: #2D3FC5;
  --primary-tint: #EEF0FF;
  --primary-on: #FFFFFF;
  --accent: #7A8BFF;
  --danger: #D14343;
  --danger-tint: #FCEDED;
  --warn: #C77A20;
  --warn-tint: #FBF1E1;
  --success: #1F8A5B;
  --success-tint: #E6F2EC;

  --r-xs: 8px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;
  --r-pill: 999px;

  --fs-base: 16px;
  --fs-scale: 1;

  --shadow-card: 0 1px 2px rgba(15,15,20,0.04), 0 6px 24px -8px rgba(15,15,20,0.08);
  --shadow-soft: 0 0.5px 0 rgba(15,15,20,0.04), 0 8px 30px -12px rgba(15,15,20,0.12);
  --shadow-pop: 0 12px 40px -8px rgba(15,15,20,0.18), 0 0 0 1px rgba(15,15,20,0.04);

  --card-bg: var(--surface);
  --card-border: 0.5px solid var(--border);
  --card-shadow: var(--shadow-card);
}

[data-theme="dark"] {
  --bg: #0C0C0E;
  --surface: #17171A;
  --surface-2: #1F1F23;
  --surface-tint: #1B1F3A;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --text: #F2F2F0;
  --text-muted: #A1A1A8;
  --text-subtle: #6E6E76;
  --primary-tint: rgba(123, 139, 255, 0.14);
  --primary-on: #FFFFFF;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px -10px rgba(0,0,0,0.6);
  --shadow-soft: 0 8px 30px -12px rgba(0,0,0,0.6);
  --shadow-pop: 0 12px 40px -8px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
  --danger-tint: rgba(209, 67, 67, 0.16);
  --warn-tint: rgba(199, 122, 32, 0.18);
  --success-tint: rgba(31, 138, 91, 0.16);
}

/* card style variants */
[data-cards="flat"] {
  --card-bg: var(--surface-2);
  --card-border: 0.5px solid transparent;
  --card-shadow: none;
}
[data-cards="soft"] {
  --card-bg: var(--surface);
  --card-border: 0.5px solid var(--border);
  --card-shadow: var(--shadow-soft);
}
[data-cards="outline"] {
  --card-bg: var(--surface);
  --card-border: 1px solid var(--border-strong);
  --card-shadow: none;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  font-family: 'Onest', -apple-system, system-ui, 'Segoe UI', sans-serif;
  font-size: calc(var(--fs-base) * var(--fs-scale));
  color: var(--text);
  background: #1A1A1F;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv11', 'ss03';
}

button { font-family: inherit; }

/* PWA app shell — fills the phone */
.app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  position: relative;
  overflow: hidden;
}

.app-scroll {
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(90px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
}
.app-scroll::-webkit-scrollbar { display: none; }

/* fade at top */
.app-scroll::before {
  content: '';
  position: sticky;
  top: 0;
  display: block;
  height: 1px;
  pointer-events: none;
}

/* top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 5;
}

.topbar-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--r-md);
  background: var(--surface);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, background 0.15s;
}
.topbar-icon:hover { background: var(--surface-2); }
.topbar-icon:active { transform: scale(0.96); }

.topbar-icon .dot {
  position: absolute;
  top: 10px; right: 12px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid var(--surface);
}

.brand {
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 1px;
}
.brand .dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--primary);
  margin-left: 5px;
  margin-bottom: 2px;
}

/* Page header / greeting */
.greet {
  padding: 6px 22px 22px;
}
.greet-eyebrow {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-subtle);
  margin-bottom: 6px;
}
.greet-name {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin: 0 0 12px;
}
.greet-name .accent { color: var(--primary); }
.greet-sub {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.45;
  max-width: 320px;
  margin: 0;
}

/* Action chips */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 22px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 40px;
  padding: 0 14px 0 12px;
  border-radius: var(--r-pill);
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text);
  font-size: 14.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { background: var(--surface-2); }
.chip:active { transform: scale(0.97); }
.chip svg { color: var(--primary); }

/* Sections */
.section {
  padding: 22px 18px 0;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-subtle);
  margin: 0 0 12px;
  padding: 0 4px;
}

/* Cards */
.card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--r-lg);
  box-shadow: var(--card-shadow);
}

.card-pad {
  padding: 18px;
}

/* Modality buttons */
.modes {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 0;
  box-sizing: border-box;
  width: 100%;
}
.mode {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex: 1;
  height: 48px;
  border-radius: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.18s;
  padding: 0 16px;
}
.mode:hover { transform: translateY(-2px); }
.mode:active { transform: scale(0.98); }
.mode-icon {
  width: 18px; height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  background: none;
  border-radius: 0;
}
.mode-label {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
}

/* AI composer */
.composer {
  margin: 0;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
  display: flex;
  align-items: center;
  padding: 6px 6px 6px 18px;
  box-shadow: var(--shadow-card);
  box-sizing: border-box;
  width: 100%;
}
.composer input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 15.5px;
  color: var(--text);
  padding: 14px 0;
  min-width: 0;
}
.composer input::placeholder { color: var(--text-subtle); }
.composer textarea {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 15.5px;
  color: var(--text);
  padding: 14px 0;
  min-width: 0;
  resize: none;
  overflow: hidden;
  min-height: 24px;
  max-height: 150px;
  line-height: 1.5;
}
.composer textarea::placeholder { color: var(--text-subtle); }
.stop-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px 9px 10px;
  border-radius: 20px;
  background: #FFF0F0;
  border: 1.5px solid #FFCDD2;
  cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 700; color: #C0392B;
  margin-bottom: 16px; transition: all 0.2s;
  width: fit-content; align-self: flex-start;
}
.stop-chip:active { background: #FFE0E0; transform: scale(0.97); }
.stop-chip-icon {
  width: 26px; height: 26px; border-radius: 8px;
  background: linear-gradient(135deg, #C0392B, #E74C3C);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: white;
}
@keyframes chipPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.3); }
  50% { box-shadow: 0 0 0 4px rgba(192,57,43,0); }
}
.stop-chip-icon { animation: chipPulse 2s ease-in-out infinite; }
.stop-sheet {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: #fff; border-radius: 28px 28px 0 0;
  z-index: 500; box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
  display: flex; flex-direction: column;
  max-height: 95%;
  height: 95%;
}
.stop-sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 499;
}
@keyframes micPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}
@keyframes sonar {
  0%   { transform: scale(1);   opacity: 0.6; }
  100% { transform: scale(2.2); opacity: 0; }
}
.mic-pulse-ring {
  position: absolute; border-radius: 50%;
  background: rgba(229,57,53,0.25);
  animation: sonar 1.4s ease-out infinite;
}
.mic-pulse-ring:nth-child(2) { animation-delay: 0.5s; }
.composer-send {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--primary);
  color: var(--primary-on);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.composer-send:hover { background: var(--primary-hover); }
.composer-send:disabled { opacity: 0.4; cursor: default; }
.composer-send:active { transform: scale(0.94); }

/* Выравнивание composer и modes по одной ширине */
.section > .composer { margin: 0; width: 100%; }
.section > .modes { padding: 0; width: 100%; }
.section:has(> .composer) { padding-left: 18px; padding-right: 18px; }
.chat-composer .composer { margin: 0; width: 100%; }
.chat-composer .modes { padding: 0; }

/* Bottom navigation */
.tabbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 6px 8px max(8px, env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-top: 1px solid var(--border-strong);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  align-items: end;
  gap: 0;
}

.tab {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 3px;
  padding: 4px 4px 2px;
  background: transparent;
  border: 0;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: color 0.15s;
  min-height: 44px;
}
.tab svg { color: var(--text); opacity: 0.78; transition: opacity 0.15s; }
.tab[data-active="true"] { color: var(--primary); }
.tab[data-active="true"] svg { color: var(--primary); opacity: 1; }
.tab:active { transform: scale(0.95); }

/* active tab indicator pill on top edge */
.tab[data-active="true"]::after {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px;
  border-radius: 0 0 999px 999px;
  background: var(--primary);
}

/* center Ok-chat tab — circular badge */
.tab.tab-ok {
  gap: 4px;
  padding-top: 0;
}
.tab-ok-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--primary-on);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  box-shadow: 0 4px 14px -3px color-mix(in srgb, var(--primary) 55%, transparent),
              0 0 0 4px var(--bg);
  transition: transform 0.18s;
  margin-top: -18px;
}
.tab-ok-circle b {
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.03em;
  line-height: 1;
}
.tab-ok-circle em {
  font-style: normal;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.02em;
  line-height: 1;
  opacity: 0.85;
}
.tab-ok:hover .tab-ok-circle { transform: translateY(-2px); }
.tab-ok[data-active="true"] .tab-ok-circle {
  box-shadow: 0 6px 18px -3px color-mix(in srgb, var(--primary) 65%, transparent);
}
.tab-ok[data-active="true"]::after { display: none; }

/* Hero banners (per-screen colored) */
.hero {
  position: relative;
  padding: 14px 18px;
  border-radius: var(--r-xl);
  margin: 0 14px;
  overflow: hidden;
  color: #fff;
  isolation: isolate;
}
.hero-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin: 0 0 4px;
  line-height: 1.05;
}
.hero-sub {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.85;
  margin: 0;
}
.hero-deco {
  position: absolute;
  inset: 0;
  z-index: -1;
}

/* News / list cards */
.news-card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--r-lg);
  box-shadow: var(--card-shadow);
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.news-card + .news-card { margin-top: 12px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 24px;
  padding: 0 9px;
  border-radius: var(--r-pill);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge.danger { background: var(--danger-tint); color: var(--danger); }
.badge.success { background: var(--success-tint); color: var(--success); }
.badge.warn { background: var(--warn-tint); color: var(--warn); }
.badge.muted { background: var(--surface-2); color: var(--text-muted); }

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  padding: 4px 18px 4px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  max-width: 100%;
  box-sizing: border-box;
}
.filters::-webkit-scrollbar { display: none; }
.filter {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 34px;
  padding: 0 14px;
  border-radius: var(--r-pill);
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text-muted);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.filter[data-active="true"] {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
.filter .count {
  font-size: 12px;
  opacity: 0.65;
  font-variant-numeric: tabular-nums;
}

/* Site category cards */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 18px;
}
.cat-card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--r-lg);
  box-shadow: var(--card-shadow);
  padding: 18px;
  cursor: pointer;
  transition: transform 0.18s;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 132px;
}
.cat-card:hover { transform: translateY(-2px); }
.cat-card:active { transform: scale(0.98); }
.cat-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cat-name {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.01em;
}
.cat-count {
  font-size: 13px;
  color: var(--text-subtle);
  margin-top: -8px;
}

/* AI prompt buttons */
.prompts {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.prompt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface-2);
  border: 0;
  border-radius: var(--r-md);
  color: var(--text);
  font-family: inherit;
  font-size: 14.5px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
}
.prompt:hover { background: color-mix(in srgb, var(--primary-tint) 70%, var(--surface-2)); }
.prompt .glyph {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  color: var(--primary);
  flex-shrink: 0;
}

/* Chat overlay */
.chat-overlay {
  position: absolute;
  inset: 0;
  z-index: 30;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.chat-header {
  padding: 14px 18px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
}
.chat-header-info { flex: 1; }
.chat-header-title { font-weight: 600; font-size: 16px; margin: 0; letter-spacing: -0.01em; }
.chat-header-sub { font-size: 12px; color: var(--text-subtle); margin: 1px 0 0; }

.chat-stream {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.chat-stream::-webkit-scrollbar { display: none; }

.msg {
  max-width: 78%;
  padding: 12px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.45;
  animation: fadeIn 0.25s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-self: flex-end;
  background: var(--primary);
  color: var(--primary-on);
  border-bottom-right-radius: 6px;
}
.msg.ai {
  align-self: flex-start;
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 6px;
}
.msg.ai .source {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-subtle);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 0.5px solid var(--border);
}
.typing {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.typing i {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-subtle);
  animation: pulse 1.2s infinite;
}
.typing i:nth-child(2) { animation-delay: 0.15s; }
.typing i:nth-child(3) { animation-delay: 0.3s; }
@keyframes pulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
  30% { opacity: 1; transform: scale(1); }
}

.chat-composer {
  padding: 12px 14px max(14px, env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 0.5px solid var(--border);
}

/* Profile sheet */
.sheet-backdrop {
  position: absolute;
  inset: 0;
  z-index: 40;
  background: rgba(0,0,0,0.4);
  animation: fadeIn2 0.2s;
}
@keyframes fadeIn2 { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 41;
  background: var(--bg);
  border-radius: 26px 26px 0 0;
  padding: 12px 0 max(20px, env(safe-area-inset-bottom));
  animation: sheetUp 0.28s cubic-bezier(0.22, 1, 0.36, 1);
  max-height: 80%;
  overflow-y: auto;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.sheet-handle {
  width: 38px; height: 4px;
  background: var(--border-strong);
  border-radius: 999px;
  margin: 4px auto 16px;
}

/* Screen container */
.screen {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: screenIn 0.25s ease-out;
  flex: 1;
}
@keyframes weatherIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Big stat card */
.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}
.stat-block {
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: var(--r-md);
  padding: 12px 14px;
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.75;
}
.stat-val {
  font-size: 20px;
  font-weight: 700;
  margin-top: 4px;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

/* Coming-soon placeholder card */
.placeholder {
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--r-lg);
  padding: 28px 20px;
  text-align: center;
  background: var(--surface-tint);
  color: var(--text);
}
.placeholder-icon {
  width: 52px; height: 52px;
  margin: 0 auto 14px;
  border-radius: 14px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.placeholder-title {
  font-size: 18px;
  font-weight: 700;
  margin: 0 0 6px;
  color: var(--primary);
  letter-spacing: -0.02em;
}
.placeholder-text {
  font-size: 14px;
  color: var(--text-muted);
  margin: 0;
  line-height: 1.5;
  max-width: 280px;
  margin-left: auto;
  margin-right: auto;
}

/* Hero variants */
.hero.indigo {
  background: linear-gradient(135deg,
    color-mix(in oklch, var(--primary) 100%, black 0%) 0%,
    color-mix(in oklch, var(--primary) 75%, var(--accent) 30%) 100%);
}
.hero.heart {
  background: linear-gradient(135deg, #15493A 0%, #1F6E54 60%, #2E8E73 100%);
}
.hero.news {
  background: linear-gradient(135deg, #18171F 0%, #2C2B36 100%);
}
.hero.sites {
  background: linear-gradient(135deg, #3A2A6E 0%, #5340A8 60%, #6B53C9 100%);
}

/* utility */
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.text-muted { color: var(--text-muted); }
.text-subtle { color: var(--text-subtle); }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.font-bold { font-weight: 700; }
.font-medium { font-weight: 500; }

/* Settings list */
.list-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  cursor: pointer;
  border-bottom: 0.5px solid var(--border);
}
.list-row:last-child { border-bottom: none; }
.list-row:hover { background: var(--surface-2); }
.list-row-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
}
.list-row-text { flex: 1; }
.list-row-title { font-weight: 500; font-size: 15.5px; }
.list-row-sub { font-size: 12.5px; color: var(--text-subtle); margin-top: 1px; }

/* article expanded */
.article-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.article-title { font-size: 18px; font-weight: 700; line-height: 1.25; margin: 0 0 8px; letter-spacing: -0.02em; }
.article-body { font-size: 14.5px; line-height: 1.5; color: var(--text-muted); margin: 0 0 12px; }
.article-source {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--surface-2);
  border-radius: var(--r-md);
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.btn-primary {
  width: 100%;
  height: 46px;
  border-radius: var(--r-md);
  background: var(--primary);
  color: var(--primary-on);
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:active { transform: scale(0.98); }

/* Voice modal */
.voice-modal {
  position: absolute;
  inset: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 90%, transparent);
  backdrop-filter: blur(30px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  animation: fadeIn2 0.25s;
}
.voice-orb {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    color-mix(in srgb, var(--primary) 90%, white 10%),
    var(--primary) 60%,
    var(--primary-hover) 100%);
  box-shadow: 0 30px 80px -10px color-mix(in srgb, var(--primary) 50%, transparent),
              inset 0 -20px 60px rgba(0,0,0,0.2);
  animation: orbPulse 2s ease-in-out infinite;
  position: relative;
}
.voice-orb::before {
  content: '';
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  border: 2px solid color-mix(in srgb, var(--primary) 40%, transparent);
  animation: orbRing 2s ease-out infinite;
}
.voice-orb::after {
  content: '';
  position: absolute;
  inset: -28px;
  border-radius: 50%;
  border: 1.5px solid color-mix(in srgb, var(--primary) 25%, transparent);
  animation: orbRing 2s ease-out 0.4s infinite;
}
@keyframes orbPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
@keyframes orbRing {
  0% { transform: scale(0.95); opacity: 1; }
  100% { transform: scale(1.4); opacity: 0; }
}
.voice-label { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
.voice-hint { font-size: 14px; color: var(--text-muted); }
.voice-close {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--surface);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text);
}

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel" data-presets="react">// screens.jsx — all OkTolk PWA screens

// ─────────────────────────────────────────────────────────────
// TopBar — shared header
// ─────────────────────────────────────────────────────────────
function TopBar({ onProfile, onNotif, hasNotif = true }) {

    <div className="topbar">
      <button className="topbar-icon" onClick={onNotif} aria-label="Уведомления">

      <button className="topbar-icon" onClick={onProfile} aria-label="Профиль">
        <IconUser size={20} sw={1.8}/>
      </button>
    </div>

}

// ─────────────────────────────────────────────────────────────
// TabBar
// ─────────────────────────────────────────────────────────────
const TABS = [
  { id: 'finance', label: 'Финансы', icon: IconWallet },
  { id: 'health',  label: 'Здоровье', icon: IconActivity },
  { id: 'home',    label: 'Ok', center: true },
  { id: 'news',    label: 'Новости', icon: IconNews },
  { id: 'sites',   label: 'Сайты', icon: IconGlobe },
];

function TabBar({ active, onChange }) {
  return (
    <div className="tabbar">
      {TABS.map(t => {
        if (t.center) {
          return (
            <button key={t.id} className="tab tab-ok"
                    data-active={active === t.id}
                    onClick={() => onChange(t.id)}>
              <span className="tab-ok-circle">
                <b>Ok</b>
                <em>чат</em>
              </span>
            </button>
          );
        }
        const I = t.icon;
        return (
          <button key={t.id} className="tab"
                  data-active={active === t.id}
                  onClick={() => onChange(t.id)}>
            <I size={24} sw={1.9}/>
            <span>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Home screen
// ─────────────────────────────────────────────────────────────

function StopMoshennnikSheet({ onClose, onAsk, messages, setMessages, facts, setFacts }) {
  const [pending, setPending] = React.useState(false);
  const [input, setInput] = React.useState('');
  const chatRef = React.useRef(null);

  React.useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, pending]);

  const allFacts = facts.join('\n---\n');

  const analysisStepRef = React.useRef('');
  const [analysisStep, setAnalysisStep] = React.useState('');

  const runAnalysis = async (updatedFacts) => {
    setPending(true);
    const steps = ['Читаю материалы…', 'Анализирую…', 'Думаю…', 'Готово!'];
    let i = 0;
    setAnalysisStep(steps[0]);
    const stepTimer = setInterval(() => {
      i++;
      if (i < steps.length) setAnalysisStep(steps[i]);
      else clearInterval(stepTimer);
    }, 1800);
    try {
      const analyzeRes = await fetch('/api/v1/antiscam/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ facts: updatedFacts.join('\\n---\\n') })
      });
      const result = await analyzeRes.json();
      clearInterval(stepTimer);
      setAnalysisStep('');
      setMessages(m => [...m.filter(x => x.type !== 'verdict'), { role: 'ai', type: 'verdict', data: result }]);
    } catch(e) {
      clearInterval(stepTimer);
      setAnalysisStep('');
      setMessages(m => [...m, { role: 'ai', text: 'Ошибка анализа.', type: 'text' }]);
    } finally {
      setPending(false);
    }
  };

  const extractAndAnalyze = async (imageBase64, mimeType, audioBase64, audioMime, url, text, userLabel, isGrouped) => {
    try {
      const extractRes = await fetch('/api/v1/antiscam/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image_base64: imageBase64 || null,
          mime_type: mimeType || 'image/jpeg',
          audio_base64: audioBase64 || null,
          audio_mime: audioMime || 'audio/webm',
          url: url || null,
          text: text || null
        })
      });
      const extractData = await extractRes.json();
      const newFacts = extractData.facts || '';
      const updatedFacts = [...facts, newFacts];
      setFacts(updatedFacts);
      return updatedFacts;
    } catch(e) {
      return facts;
    }
  };

  const handleText = async () => {
    if (!input.trim()) return;
    const txt = input.trim();
    setMessages(m => [...m, { role: 'user', text: txt }]);
    setInput('');
    const updatedFacts = await extractAndAnalyze(null, null, null, null, null, txt, '', true);
    runAnalysis(updatedFacts, 1);
  };

  const handlePhoto = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
    inp.onchange = async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      const label = files.length > 1 ? '📷 Скриншотов отправлено: ' + files.length : '📷 Скриншот отправлен';
      setMessages(m => [...m, { role: 'user', text: label }]);
      let updatedFacts = facts;
      for (const file of files) {
        const base64 = await new Promise(res => {
          const r = new FileReader();
          r.onloadend = () => res(r.result.split(',')[1]);
          r.readAsDataURL(file);
        });
        updatedFacts = await extractAndAnalyze(base64, file.type, null, null, null, null, '', true);
      }
      runAnalysis(updatedFacts, files.length);
    };
    inp.click();
  };

  const handleAudio = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'audio/*,video/mp4';
    inp.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      setMessages(m => [...m, { role: 'user', text: '🎵 Аудио отправлено' }]);
      const base64 = await new Promise(res => {
        const r = new FileReader();
        r.onloadend = () => res(r.result.split(',')[1]);
        r.readAsDataURL(file);
      });
      const updatedFacts = await extractAndAnalyze(null, null, base64, file.type, null, null, '', true);
      runAnalysis(updatedFacts, 1);
    };
    inp.click();
  };

  const handleUrl = async () => {
    const url = input.trim();
    if (!url) return;
    setMessages(m => [...m, { role: 'user', text: '🔗 ' + url }]);
    setInput('');
    const updatedFacts = await extractAndAnalyze(null, null, null, null, url, null, '', true);
    runAnalysis(updatedFacts, 1);
  };

  const handleVoice = () => {
    if (!window.VoiceRecorder) return;
    window.VoiceRecorder.start(
      (text) => { setInput(text); },
      (err) => { console.error(err); },
      () => {}
    );
  };

  const chatHistory = React.useRef([]);

  const askQuestion = async () => {
    if (!input.trim()) return;
    const q = input.trim();
    setMessages(m => [...m, { role: 'user', text: q }]);
    chatHistory.current.push({ role: 'user', content: q });
    setInput('');
    setPending(true);
    setAnalysisStep('Думаю…');
    try {
      const res = await fetch('/api/v1/antiscam/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          facts: allFacts || 'Контекст не задан',
          question: q,
          history: chatHistory.current.slice(-10)
        })

      const reply = result.reply || 'Не удалось получить ответ';
      chatHistory.current.push({ role: 'assistant', content: reply });
      setMessages(m => [...m, { role: 'ai', type: 'text', text: reply }]);

      setMessages(m => [...m, { role: 'ai', text: 'Ошибка. Попробуйте снова.', type: 'text' }]);

    if (level === 0) return '✅';
    if (level <= 2) return '⚠️';
    return '🚨';
  };

  const riskBg = { 0: '#D1FAE5', 1: '#FEF3C7', 2: '#FEF3C7', 3: '#FFE5E5', 4: '#FFE5E5', 5: '#FFE5E5' };

function WeatherWidget() {
  const [w, setW] = React.useState(() => { try { const cached = localStorage.getItem("oktolk_weather"); if (cached) { const { data, ts } = JSON.parse(cached); if (Date.now() - ts < 1800000) return data; } } catch(e) {} return null; });
  React.useEffect(() => {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const lat = pos.coords.latitude.toFixed(2);
        const lon = pos.coords.longitude.toFixed(2);
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=2';
        const r = await fetch(url);
        const d = await r.json();
        const ico = (c) => c===0?'☀️':c<=2?'⛅':c<=3?'☁️':c<=48?'🌫️':c<=67?'🌧️':c<=77?'❄️':'⛈️';
        const txt = (c) => c===0?'ясно':c<=2?'малооблачно':c<=3?'облачно':c<=48?'туман':c<=67?'дождь':c<=77?'снег':'гроза';
        const wd = { ti:ico(d.daily.weathercode[0]), tt:txt(d.daily.weathercode[0]), tmax:Math.round(d.daily.temperature_2m_max[0]), tmin:Math.round(d.daily.temperature_2m_min[0]), mi:ico(d.daily.weathercode[1]), mt:txt(d.daily.weathercode[1]), mmax:Math.round(d.daily.temperature_2m_max[1]), mmin:Math.round(d.daily.temperature_2m_min[1]) }; localStorage.setItem("oktolk_weather", JSON.stringify({ data: wd, ts: Date.now() })); setW(wd);
      } catch(e) {}
    }, () => {});
  }, []);
  if (!w) return null;
  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:20, padding:'16px 18px', width:'100%', animation:'weatherIn 0.4s ease-out' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <span style={{ fontSize:44, lineHeight:1 }}>{w.ti}</span>
          <div>
            <div style={{ fontSize:42, fontWeight:700, color:'var(--text)', lineHeight:1 }}>{w.tmax}°</div>
            <div style={{ fontSize:14, color:'var(--text-muted)', marginTop:4 }}>{w.tt}</div>
          </div>
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:13, color:'var(--text-subtle)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em' }}>Сегодня</div>
          <div style={{ fontSize:14, color:'var(--text-muted)', marginTop:4 }}>мин {w.tmin}° · макс {w.tmax}°</div>
        </div>
      </div>
      <div style={{ height:1, background:'var(--border)', margin:'14px 0' }}/>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:22 }}>{w.mi}</span>
          <span style={{ fontSize:15, color:'var(--text-muted)' }}>{w.mt}</span>
        </div>
        <div style={{ fontSize:13, color:'var(--text-subtle)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em' }}>Завтра</div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:18, fontWeight:600, color:'var(--text)' }}>{w.mmax}°</div>
          <div style={{ fontSize:13, color:'var(--text-subtle)' }}>мин {w.mmin}°</div>
        </div>
      </div>
    </div>
  );
}

function VoiceButton({ onResult, onError }) {
  const [active, setActive] = React.useState(false);
  const handle = () => {
    if (active) {
      window.VoiceRecorder.stop();
      setActive(false);
      return;
    }
    if (!window.VoiceRecorder) return;
    setActive(true);
    window.VoiceRecorder.start(
      (text) => { setActive(false); if (onResult) onResult(text); },
      (err) => { setActive(false); if (onError) onError(err); },
      () => { setActive(false); }
    );
  };
  return (
    <button className="mode" onClick={handle} style={{ background: active ? 'var(--danger-tint)' : undefined }}>
      <span className="mode-icon" style={{ color: active ? 'var(--danger)' : undefined, animation: active ? 'micPulse 1s ease-in-out infinite' : 'none' }}><IconMic size={22}/></span>
      <span className="mode-label" style={{ color: active ? 'var(--danger)' : undefined }}>{active ? 'Стоп' : 'Голос'}</span>
    </button>
  );
}

  const loadSummary = () => {
    const userId = parseInt(localStorage.getItem('oktolk_user_id') || '1');
    fetch('/api/v1/finance/summary/public/' + userId)
      .then(r => r.json())
      .then(data => {
        const map = {};
        let t = 0;
        (data.categories || []).forEach(c => { map[c.category] = c.total; t += c.total; });
        setSummary(map);
        setTotal(t);
      }).catch(() => {});
  };

  const sendFinance = async (textOverride, imageBase64, mimeType) => {
    const text = textOverride || input.trim();
    if (!text && !imageBase64) return;
    setInput('');
    const token = localStorage.getItem('oktolk_token') || 'demo';
    const userId = parseInt(localStorage.getItem('oktolk_user_id') || '1');
    try {
      const body = { user_id: userId };

      else { body.text = text; }
      const res = await fetch('/api/v1/finance/parse', {
        method: 'POST',

function AudioButton({ text }) {
  const [status, setStatus] = React.useState('idle'); // idle | loading | playing | error
  const audioRef = React.useRef(null);

  const handleClick = async () => {
    if (status === 'playing') {
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      setStatus('idle');
      return;
    }
    setStatus('loading');
    try {
      const resp = await fetch('/api/v1/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voice: 'alena' })
      });
      if (!resp.ok) throw new Error('Ошибка сервера');
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audioRef.current = audio;
      audio.onended = () => setStatus('idle');
      audio.onerror = () => setStatus('error');
      await audio.play();
      setStatus('playing');
    } catch(e) {
      setStatus('error');
      setTimeout(() => setStatus('idle'), 2000);
    }
  };

  const label = status === 'loading' ? 'Загрузка...' : status === 'playing' ? 'Стоп' : status === 'error' ? 'Ошибка' : 'Слушать';
  const icon = status === 'playing'
    ? <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>;

  return (
    <button className="btn-primary"
      style={{ flex: 1, background: status === 'playing' ? 'var(--danger)' : 'var(--surface-2)', color: status === 'playing' ? '#fff' : 'var(--text)', opacity: status === 'loading' ? 0.7 : 1 }}
      onClick={handleClick} disabled={status === 'loading'}>
      {icon}
      {label}
    </button>
  );
}

<script type="text/babel" data-presets="react">// overlays.jsx — Chat, Profile sheet, Voice modal

function ChatOverlay({ initialMsg, onClose }) {
  const [messages, setMessages] = React.useState(() => initialMsg
    ? [{ role: 'user', text: initialMsg }]
    : []
  );
  const [pending, setPending] = React.useState(false);
  const [input, setInput] = React.useState('');
  const [voiceActive, setVoiceActive] = React.useState(false);
  const streamRef = React.useRef(null);

  React.useEffect(() => {
    if (streamRef.current) streamRef.current.scrollTop = streamRef.current.scrollHeight;
  }, [messages, pending]);

  // auto-send the initial message
  React.useEffect(() => {
    if (initialMsg && messages.length === 1 && !pending) {
      askClaude(initialMsg);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const askClaude = async (text) => {
    setPending(true);
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: text, history: [] })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: 'ai', text: data.reply, source: 'OkTolk AI' }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'ai', text: 'Не удалось получить ответ. Проверьте подключение к интернету.', source: 'OkTolk AI' }]);
    } finally {
      setPending(false);
    }
  };

  const askClaudeWithImage = async (base64, mimeType) => {
    setPending(true);
    try {
      const res = await fetch('/api/v1/chat/image', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ image_base64: base64, mime_type: mimeType })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: 'ai', text: data.reply, source: 'OkTolk AI' }]);
    } catch(e) {
      setMessages(m => [...m, { role: 'ai', text: 'Не удалось проанализировать файл.', source: 'OkTolk AI' }]);
    } finally {
      setPending(false);
    }
  };
  const send = () => {
    const t = input.trim();
    if (!t || pending) return;
    setMessages(m => [...m, { role: 'user', text: t }]);
    setInput('');
    askClaude(t);
  };

  return (
    <div className="chat-overlay">
      <div className="chat-header">

        </div>
      </div>

      <div className="chat-stream" ref={streamRef}>
        {messages.length === 0 && (
          <div style={{ textAlign: 'center', color: 'var(--text-subtle)', padding: '40px 20px', fontSize: 14 }}>
            Задайте любой вопрос — отвечу простым языком.

        {messages.map((m, i) => (
          <div key={i} className={'msg ' + m.role}>

            {m.role === 'ai' && m.source && (
              <div className="source"><IconSparkles size={11}/> {m.source}</div>
            )}
          </div>
        ))}
        {pending && (
          <div className="msg ai">

      </div>

  
      <div className="chat-composer">
        <div className="composer" style={{ margin: 0 }}>
          <textarea value={input}
                 onChange={e => setInput(e.target.value)}
                 onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }}}

              const file = e.target.files[0];

              const reader = new FileReader();

        </div>
      </div>
    </div>
  );
}

function AuthScreen({ onAuth }) {
  const [mode, setMode] = React.useState('login');
  const [phone, setPhone] = React.useState('');
  const [name, setName] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [pending, setPending] = React.useState(false);

  const formatPhone = (v) => {
    const digits = v.replace(/\D/g, '');
    if (digits.length <= 1) return digits ? '+7' : '';
    const d = digits.startsWith('7') ? digits.slice(1) : digits;
    let r = '+7';
    if (d.length > 0) r += ' (' + d.slice(0, 3);
    if (d.length >= 3) r += ') ' + d.slice(3, 6);
    if (d.length >= 6) r += '-' + d.slice(6, 8);
    if (d.length >= 8) r += '-' + d.slice(8, 10);
    return r;
  };

  const getRawPhone = (v) => '+7' + v.replace(/\D/g, '').slice(1);

  const submit = async () => {
    setError('');
    setPending(true);
    try {
      const endpoint = mode === 'login' ? '/api/v1/auth/login' : '/api/v1/auth/register';
      const body = mode === 'login'
        ? { phone: getRawPhone(phone), password }
        : { phone: getRawPhone(phone), name: name.trim(), password };
      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      localStorage.setItem('oktolk_token', data.token);
      localStorage.setItem('oktolk_user_id', String(data.user_id));
      localStorage.setItem('oktolk_name', data.name);
      localStorage.setItem('oktolk_tariff', data.tariff || 'demo');
      onAuth({ token: data.token, user_id: data.user_id, name: data.name, tariff: data.tariff });
    } catch(e) {
      setError('Нет соединения с сервером');
    } finally {
      setPending(false);
    }
  };

  return (
    <div style={{
      minHeight: '100dvh', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: 'var(--bg)', padding: '24px 20px'
    }}>
      <div style={{ marginBottom: 32, textAlign: 'center' }}>
        <div style={{
          width: 72, height: 72, borderRadius: 20,
          background: 'var(--primary)', color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 28, fontWeight: 800, margin: '0 auto 16px'
        }}>Ok</div>
        <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: '-0.02em' }}>OkTolk</div>
        <div style={{ fontSize: 14, color: 'var(--text-muted)', marginTop: 4 }}>
          {mode === 'login' ? 'Войдите в свой аккаунт' : 'Создайте аккаунт'}
        </div>
      </div>
      <div style={{
        width: '100%', maxWidth: 360,
        background: 'var(--surface)', borderRadius: 20,
        padding: '24px 20px', boxShadow: 'var(--shadow-card)'
      }}>
        {mode === 'register' && (
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Ваше имя</div>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Евгений"
              style={{ width: '100%', padding: '12px 14px', borderRadius: 12,
                border: '1px solid var(--border-strong)', background: 'var(--surface-2)',
                fontSize: 16, color: 'var(--text)', outline: 'none', boxSizing: 'border-box' }}/>
          </div>
        )}
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Телефон</div>
          <input value={phone} onChange={e => setPhone(formatPhone(e.target.value))}
            placeholder="+7 (999) 000-00-00" type="tel"
            style={{ width: '100%', padding: '12px 14px', borderRadius: 12,
              border: '1px solid var(--border-strong)', background: 'var(--surface-2)',
              fontSize: 16, color: 'var(--text)', outline: 'none', boxSizing: 'border-box' }}/>
        </div>
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Пароль</div>
          <input value={password} onChange={e => setPassword(e.target.value)}
            placeholder="Минимум 6 символов" type="password"
            onKeyDown={e => e.key === 'Enter' && submit()}
            style={{ width: '100%', padding: '12px 14px', borderRadius: 12,
              border: '1px solid var(--border-strong)', background: 'var(--surface-2)',
              fontSize: 16, color: 'var(--text)', outline: 'none', boxSizing: 'border-box' }}/>
        </div>
        {error && (
          <div style={{ background: 'var(--danger-tint)', color: 'var(--danger)',
            borderRadius: 10, padding: '10px 14px', fontSize: 14,
            marginBottom: 16, textAlign: 'center' }}>{error}</div>

        <button onClick={submit} disabled={pending} style={{
          width: '100%', padding: '14px', borderRadius: 14,

          <span style={{ fontSize: 14, color: 'var(--text-muted)' }}>
            {mode === 'login' ? 'Нет аккаунта? ' : 'Уже есть аккаунт? '}

      <div style={{ marginTop: 24, textAlign: 'center', fontSize: 12, color: 'var(--text-subtle)' }}>

function VoiceModal({ onClose, onResult }) {
  const [status, setStatus] = React.useState('ready');
  const [hint, setHint] = React.useState('Нажмите микрофон');

  const startRec = async () => {
    setStatus('recording');
    setHint('Слушаю... тишина 5 сек — остановит');
    await window.VoiceRecorder.start(
      (text) => {
        setStatus('ready');
        setHint('Нажмите микрофон');
        if (onResult) onResult(text);
        onClose();
      },
      (err) => {
        setStatus('error');
        setHint(err);
        setTimeout(() => { setStatus('ready'); setHint('Нажмите микрофон'); }, 2000);
      },
      () => {
        setStatus('processing');
        setHint('Распознаю...');
      }
    );
  };

  const handleMic = () => {
    if (status === 'ready' || status === 'error') startRec();
    else if (status === 'recording') {
      setStatus('processing');
      setHint('Распознаю...');
      window.VoiceRecorder.stop();
    }
  };

  const micColor = status === 'recording' ? '#E53935' : status === 'processing' ? '#F59E0B' : status === 'done' ? '#1F8A5B' : 'var(--primary)';
  const pulse = status === 'recording';

  return (
    <div style={{
      position: 'fixed', bottom: 110, left: '50%', transform: 'translateX(-50%)',
      background: 'white', borderRadius: 28, padding: '20px 28px',

        {pulse && <div className="mic-pulse-ring" style={{ width: 64, height: 64, top: 0, left: 0 }}/>}
        <button onClick={handleMic} style={{
          width: 64, height: 64, borderRadius: '50%', border: 'none',
          background: micColor, color: 'white', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'all 0.3s', position: 'relative', zIndex: 1
        }}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)' }}>
          {status === 'ready' && 'Нажмите микрофон'}
          {status === 'recording' && 'Слушаю вас...'}
          {status === 'processing' && 'Распознаю...'}
          {status === 'error' && 'Ошибка'}

function applyTheme(t) {
  const root = document.documentElement;
  const p = PALETTES[t.palette] || PALETTES.cobalt;
  root.style.setProperty('--primary', p.primary);
  root.style.setProperty('--primary-hover', p.primaryHover);
  root.style.setProperty('--accent', p.accent);
  root.style.setProperty('--primary-tint', t.dark ? p.primaryTintDark : p.primaryTint);

  // radius scale (base = 1.0 → 14px md)
  const r = t.radius;
  root.style.setProperty('--r-xs', `${Math.max(4, 6 * r)}px`);
  root.style.setProperty('--r-sm', `${Math.max(6, 9 * r)}px`);
  root.style.setProperty('--r-md', `${Math.max(8, 13 * r)}px`);
  root.style.setProperty('--r-lg', `${Math.max(10, 19 * r)}px`);
  root.style.setProperty('--r-xl', `${Math.max(12, 25 * r)}px`);

  root.style.setProperty('--fs-base', `${t.fontSize}px`);

  root.dataset.theme = t.dark ? 'dark' : 'light';
  root.dataset.cards = t.cards;
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "cobalt",
  "dark": false,
  "cards": "soft",
  "radius": 1,
  "fontSize": 16

<script>
// ── Voice Recording Module v2 (auto-stop + reset) ─────────────
window.VoiceRecorder = {
  mediaRecorder: null,
  chunks: [],
  stream: null,
  silenceTimer: null,
  analyser: null,
  audioCtx: null,

  async start(onResult, onError, onSilence) {
    try {
      this.chunks = [];
      this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      this.mediaRecorder = new MediaRecorder(this.stream, { mimeType: 'audio/webm' });

      this.mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) this.chunks.push(e.data);
      };

      this.mediaRecorder.onstop = async () => {
        this._cleanup();
        const blob = new Blob(this.chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = async () => {
          const base64 = reader.result.split(',')[1];
          try {
            const resp = await fetch('/api/v1/stt', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ audio_base64: base64, mime_type: 'audio/webm' })
            });
            const data = await resp.json();
            if (data.text) onResult(data.text);
            else onError('Не удалось распознать');
          } catch(e) {
            onError('Ошибка сервера');
          }
        };
        reader.readAsDataURL(blob);
      };

      this.mediaRecorder.start(100);
      this._startSilenceDetection(onSilence);
      return true;
    } catch(e) {
      onError('Нет доступа к микрофону');
      return false;
    }
  },

  _startSilenceDetection(onSilence) {
    this.audioCtx = new AudioContext();
    this.analyser = this.audioCtx.createAnalyser();
    const source = this.audioCtx.createMediaStreamSource(this.stream);
    source.connect(this.analyser);
    this.analyser.fftSize = 512;
    const data = new Uint8Array(this.analyser.frequencyBinCount);
    let silenceStart = null;

    const check = () => {
      if (!this.mediaRecorder || this.mediaRecorder.state === 'inactive') return;
      this.analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      if (avg < 8) {
        if (!silenceStart) silenceStart = Date.now();
        else if (Date.now() - silenceStart > 3000) {
          if (onSilence) onSilence();
          this.stop();
          return;
        }
      } else {
        silenceStart = null;
      }
      requestAnimationFrame(check);
    };
    requestAnimationFrame(check);
  },

  stop() {
    if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
      this.mediaRecorder.stop();
    }
    this._cleanup();
  },

  _cleanup() {
    if (this.stream) {
      this.stream.getTracks().forEach(t => t.stop());
      this.stream = null;
    }
    if (this.audioCtx) {
      this.audioCtx.close();
      this.audioCtx = null;
    }
    if (this.silenceTimer) {
      clearTimeout(this.silenceTimer);
      this.silenceTimer = null;
    }
  }
};
</script>
