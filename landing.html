  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n-inline: auto; text-align: center; }\n.section-head h2 { margin: 18px 0 16px; }\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 10px;\n  font-size: 17px;\n  font-weight: 600;\n  padding: 0 26px;\n  height: 56px;\n  border-radius: var(--r-btn);\n  transition: transform .18s ease, box-shadow .18s ease, background .18s ease;\n  white-space: nowrap;\n}\n.btn svg { width: 20px; height: 20px; }\n.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 12px 26px -10px rgba(59,79,224,.6); }\n.btn-primary:hover { background: var(--primary-700); transform: translateY(-2px); box-shadow: 0 18px 34px -12px rgba(59,79,224,.7); }\n.btn-ghost { background: var(--surface); color: var(--text); border: 1.5px solid var(--line); }\n.btn-ghost:hover { border-color: var(--text); transform: translateY(-2px); }\n.btn-lg { height: 62px; font-size: 18px; padding: 0 32px; }\n.btn-block { width: 100%; }\n\n/* ============================================================\n   Header\n   ============================================================ */\n.site-header {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: rgba(250,250,247,.82);\n  backdrop-filter: saturate(180%) blur(14px);\n  border-bottom: 1px solid transparent;\n  transition: border-color .25s ease, background .25s ease;\n}\n.site-header.scrolled { border-color: var(--line); }\n.header-inner {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  height: 76px;\n}\n.brand { display: flex; align-items: center; gap: 11px; font-weight: 800; font-size: 21px; letter-spacing: -.02em; }\n.brand-mark {\n  width: 38px; height: 38px; border-radius: 11px;\n  background: linear-gradient(150deg, var(--primary), #6B7BFF);\n  display: grid; place-items: center;\n  color: #fff; font-weight: 800; font-size: 19px;\n  box-shadow: 0 8px 18px -6px rgba(59,79,224,.6);\n}\n.nav-links { display: flex; align-items: center; gap: 8px; }\n.nav-links a {\n  font-size: 15.5px; font-weight: 500; color: var(--text-muted);\n  padding: 10px 16px;\n  border-radius: 12px;\n  white-space: nowrap;\n  position: relative;\n  transition: color .22s ease, transform .22s cubic-bezier(.22,.61,.36,1),\n              background-color .22s ease, box-shadow .22s ease;\n}\n.nav-links a:hover {\n  color: var(--primary);\n  background: var(--primary-100);\n  transform: translateY(-3px);\n  box-shadow: 0 10px 22px -14px rgba(59,79,224,.55);\n}\n.header-cta { display: flex; align-items: center; gap: 14px; }\n.header-cta .btn { height: 46px; font-size: 15.5px; padding: 0 20px; }\n.btn-share { gap: 8px; padding: 0 16px; }\n.btn-share svg { width: 18px; height: 18px; }\n@media (max-width: 1080px) { .btn-share-lbl { display: none; } .btn-share { padding: 0; width: 46px; } }\n@media (max-width: 900px) { .nav-links { display: none; } }\n\n/* ============================================================\n   Hero\n   ============================================================ */\n.hero { padding-top: clamp(40px, 7vw, 84px); padding-bottom: clamp(60px, 9vw, 120px); overflow: hidden; }\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.05fr .95fr;\n  gap: clamp(40px, 6vw, 80px);\n  align-items: center;\n}\n.hero h1 { margin: 22px 0 22px; }\n.hero h1 .accent { color: var(--primary); }\n.hero .lead { max-width: 520px; }\n.hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 34px; }\n.hero-fineprint {\n  display: flex; flex-wrap: wrap; gap: 8px 18px;\n  margin-top: 22px; font-size: 14.5px; color: var(--text-muted); font-weight: 500;\n}\n.hero-fineprint span { display: inline-flex; align-items: center; gap: 7px; }\n.hero-fineprint svg { width: 16px; height: 16px; color: var(--success); }\n\n.hero-visual { position: relative; display: flex; justify-content: center; }\n.hero-blob {\n  position: absolute; inset: -8% -12%;\n  background:\n    radial-gradient(60% 60% at 70% 25%, rgba(59,79,224,.20), transparent \n.kb-row .kb-ico svg { width: 19px; height: 19px; }\n.kb-row .kb-lbl { font-size: 12.5px; color: var(--text-muted); }\n.kb-row .kb-val { font-size: 15px; font-weight: 700; margin-top: 1px; }\n.kb-row .kb-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }\n.kb-tag { font-size: 12px; font-weight: 600; color: var(--primary-700); background: var(--primary-100); padding: 3px 9px; border-radius: 999px; }\n.kb-add { display: flex; align-items: center; gap: 9px; color: var(--primary); font-weight: 600; font-size: 13.5px; margin-top: 4px; padding: 10px 14px; border: 1.5px dashed var(--primary-100); border-radius: 14px; }\n.kb-add svg { width: 17px; height: 17px; }\n\n.kb-chat { background: #fff; border-radius: var(--r-card); padding: 20px; box-shadow: var(--sh-md); margin-top: 16px; }\n.kb-chip-ctx { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--primary-700); background: var(--primary-100); padding: 6px 12px; border-radius: 999px; margin-bottom: 14px; }\n.kb-chip-ctx svg { width: 14px; height: 14px; }\n.kb-bubble { font-size: 14.5px; line-height: 1.5; border-radius: 15px 15px 15px 5px; padding: 12px 14px; background: var(--bg-2); max-width: 90%; }\n.kb-bubble.me { align-self: flex-end; margin-left: auto; background: var(--primary); color: #fff; border-radius: 15px 15px 5px 15px; }\n.kb-bubble.bot { margin-top: 10px; background: #fff; border: 1px solid var(--line); }\n.kb-bubble.bot b { color: var(--primary-700); }\n.kb-chat-flow { display: flex; flex-direction: column; }\n<\u002Fstyle>\n<style>/* ============================================================\n   OkTolk — Scrollytelling sections\n   Principles (sticky phone) + Chaos→Order\n   ============================================================ */\n\n/* ============================================================\n   PRINCIPLES — sticky phone scrollytelling\n   ============================================================ */\n.principles-tell { padding-top: 0; padding-bottom: 0; }\n.principles-tell .section-head { padding-bottom: clamp(28px,4vw,56px); }\n\n.pt-stage {\n  position: relative;\n  /* total scroll length — 1 viewport for sticky + ~3.4 for content */\n  height: 440vh;\n}\n.pt-sticky {\n  position: sticky; top: 0;\n  height: 100vh;\n  display: flex; align-items: center;\n  overflow: visible;\n}\n.pt-inner {\n  display: grid;\n  grid-template-columns: minmax(320px, 1fr) 1.05fr;\n  gap: clamp(28px, 5vw, 80px);\n  align-items: center;\n  width: 100%;\n}\n\n/* ----- LEFT: phone ----- */\n.pt-phone-wrap {\n  display: flex; flex-direction: column;\n  align-items: center; gap: 18px;\n  position: relative;\n}\n.pt-phone {\n  position: relative;\n  width: clamp(280px, 24vw, 340px);\n  background: #0E0E12;\n  border-radius: 46px;\n  padding: 11px;\n  box-shadow: var(--sh-lg);\n}\n.pt-phone::after { /* notch */\n  content: \"\"; position: absolute;\n  top: 18px; left: 50%; transform: translateX(-50%);\n  width: 116px; height: 26px;\n  background: #0E0E12; border-radius: 999px; z-index: 6;\n}\n.pt-phone-screen {\n  position: relative;\n  border-radius: 36px;\n  overflow: hidden;\n  background: #FAFAF7;\n  aspect-ratio: 320 / 660;\n}\n.pt-statusbar {\n  position: absolute; top: 14px; left: 0; right: 0;\n  display: flex; justify-content: space-between; padding: 0 26px;\n  font-size: 13px; font-weight: 600; z-index: 7;\n  color: #16161A;\n}\n.pt-stagewrap {\n  position: absolute; inset: 0;\n  padding: 42px 12px 60px;\n  background: #FAFAF7;\n}\n\n/* phone tab bar (fixed in phone) */\n.pt-tabbar {\n  position: absolute; bottom: 0; left: 0; right: 0;\n  height: 54px;\n  background: color-mix(in srgb, #fff 88%, transparent);\n  backdrop-filter: blur(14px);\n  border-top: 0.5px solid rgba(15,15,20,.08);\n  display: flex; justify-content: space-around; align-items: center;\n  padding: 0 8px;\n  z-index: 5;\n}\n.pt-tab {\n  display: flex; flex-direction: column; align-items: center; gap: 2px;\n  font-size: 10px; font-weight: 600; color: #6B6B72;\n  transition: color .25s ease;\n}\n.pt-tab svg { width: 19px; height: 19px; }\n.pt-tab.on { color: var(--primary); }\n.pt-tab-ok {\n  width: 44px; height: 44px; border-radius: 50%;\n  background: var(--primary); color: #fff;\n  display: grid; place-items: center;\n  font-size: 13px; font-weight: 800;\n  margin-top: -16px;\n  box-shadow: 0 6px 16px -3px rgba(59,79,224,.55), 0 0 0 4px #FAFAF7;\n}\n\n/* scenes container */\n.pt-scenes { position: absolute; inset: 42px 0 54px; overflow: hidden; }\n.pt-scene {\n  position: absolute; inset: 0;\n  padding: 6px 12px 8px;\n  display: flex; flex-direction: column;\n  gap: 10px;\n  opacity: 0;\n  transform: translateY(14px) scale(.985);\n  transition: opacity .4s ease, transform .55s cubic-bezier(.22,.61,.36,1);\n  pointer-events: none;\n  will-change: opacity, transform;\n}\n.pt-scene.on { opacity: 1; transform: none; pointer-events: auto; }\n.pt-scene.out-up { transform: translateY(-14px) scale(.985); }\n\n/* phone hint */\n.pt-hint {\n  font-size: 13px; color: var(--text-muted);\n  display: inline-flex; align-items: center; gap: 8px;\n}\n.pt-hint::before {\n  content: \"\"; width: 6px; height: 6px; border-radius: 50%;\n  background: var(--primary);\n  animation: ptPulse 2s ease-in-out infinite;\n}\n@keyframes ptPulse {\n  0%,100% { opacity: .35; transform: scale(.9); }\n  50%     { opacity: 1;   transform: scale(1.35); }\n}\n\n/* ----- RIGHT: chapters ----- */\n.pt-chapters {\n  display: flex; flex-direction: column;\n  gap: clamp(14px, 1.8vw, 22px);\n}\n.pt-chap {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-card);\n  padding: clamp(20px, 2.4vw, 30px);\n  display: flex; flex-direction: column; gap: 12px;\n  opacity: .28;\n  transform: translateY(8px) scale(.987);\n  transition: opacity .55s ease, transform .55s cubic-bezier(.22,.61,.36,1),\n              box-shadow .5s ease, border-color .5s ease, background .5s ease;\n}\n.pt-chap.on {\n  opacity: 1; transform: none;\n  box-shadow: var(--sh-md);\n}\n.pt-chap[data-chap=\"control\"].on {\n  background: linear-gradient(160deg, #EEF1FE, #E2E7FD);\n  border-color: rgba(59,79,224,.22);\n}\n.pt-chap[data-chap=\"safety\"].on {\n  background: linear-gradient(160deg, #FCEDED, #F7DEDE);\n  border-color: rgba(209,67,67,.22);\n}\n.pt-chap[data-chap=\"ways\"].on {\n  background: linear-gradient(160deg, #E6F2EC, #D6EDE0);\n  border-color: rgba(46,142,115,.25);\n}\n\n.pt-chap-head { display: flex; align-items: center; gap: 14px; }\n.pt-chap-num {\n  flex: none;\n  width: 52px; height: 52px; border-radius: 15px;\n  display: grid; place-items: center;\n}\n.pt-chap-num svg { width: 26px; height: 26px; }\n.pt-chap[data-chap=\"control\"] .pt-chap-num { background: rgba(59,79,224,.16); color: var(--primary); }\n.pt-chap[data-chap=\"safety\"]  .pt-chap-num { background: rgba(209,67,67,.18); color: var(--scam); }\n.pt-chap[data-chap=\"ways\"]    .pt-chap-num { background: rgba(46,142,115,.20); color: var(--health-b); }\n\n.pt-chap-tag {\n  font-size: 12.5px; font-weight: 700;\n  letter-spacing: .08em; text-transform: uppercase;\n  color: var(--text-muted);\n}\n.pt-chap h3 { font-size: clamp(22px, 2.5vw, 30px); }\n.pt-chap p { color: var(--text-muted); font-size: clamp(15px, 1.4vw, 16.5px); line-height: 1.55; }\n\n/* tiny dots — current sub-step inside chapter */\n.pt-dots { display: flex; gap: 6px; margin-top: 4px; }\n.pt-dot {\n  width: 22px; height: 4px; border-radius: 999px;\n  background: rgba(22,22,26,.10);\n  transition: background .35s ease, width .35s ease;\n}\n.pt-chap[data-chap=\"control\"] .pt-dot.on { background: var(--primary); width: 32px; }\n.pt-chap[data-chap=\"safety\"] .pt-dot.on { background: var(--scam); width: 32px; }\n.pt-chap[data-chap=\"ways\"] .pt-dot.on { background: var(--health-b); width: 32px; }\n\n@media (max-width: 880px) {\n  .pt-inner { grid-template-columns: 1fr; gap: 24px; }\n  .pt-stage { height: 480vh; }\n  .pt-chapters { gap: 12px; }\n  .pt-chap { padding: 16px 18px; }\n  .pt-chap h3 { font-size: 19px; }\n  .pt-chap p { font-size: 14.5px; }\n}\n\n/* =================== PHONE SCENE STYLES =================== */\n/* Reusable mini app components inside the phone */\n\n.ps-row { display: flex; align-items: center; gap: 9px; }\n\n/* Greet header */\n.ps-top {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 4px;\n}\n.ps-top .greet { font-size: 12.5px; color: #6B6B72; }\n.ps-top .greet b { display: block; color: #16161A; font-size: 16px; font-weight: 700; margin-top: 2px; }\n.ps-ava { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(150deg, #3B4FE0, #7A8BFF); }\n\n/* Chips row */\n.ps-chips { display: flex; gap: 6px; overflow: hidden; padding: 0 4px; }\n.ps-chip {\n  flex: none;\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px;\n  background: #fff; border: 1px solid rgba(15,15,20,.08);\n  border-radius: 999px;\n  font-size: 11.5px; font-weight: 600; color: #16161A;\n}\n.ps-chip svg { width: 13px; height: 13px; color: var(--primary); }\n.ps-chip.red svg { color: var(--scam); }\n.ps-chip.green svg { color: var(--health-b); }\n\n/* Big hero card on phone */\n.ps-hero {\n  border-radius: 16px;\n  padding: 14px 16px;\n  color: #fff;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.ps-hero.indigo { background: linear-gradient(155deg, #3B4FE0, #6577FF); }\n.ps-hero.red    { background: linear-gradient(155deg, #D14343, #B23636); }\n.ps-hero.green  { background: linear-gradient(155deg, #2E8E73, #156E54); }\n.ps-hero .ph-eyebrow { font-size: 9.5px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; opacity: .8; }\n.ps-hero .ph-title   { font-size: 14.5px; font-weight: 700; margin-top: 2px; }\n.ps-hero .ph-amount  { font-size: 26px; font-weight: 800; letter-spacing: -.02em; margin-top: 6px; }\n.ps-hero .ph-sub     { font-size: 11.5px; opacity: .82; margin-top: 2px; }\n\n/* Category tile grid */\n.ps-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }\n.ps-cat {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 12px;\n  padding: 9px 10px;\n  display: flex; align-items: center; gap: 8px;\n}\n.ps-cat-ico {\n  flex: none; width: 28px; height: 28px; border-radius: 9px;\n  background: var(--primary-100); color: var(--primary);\n  display: grid; place-items: center;\n}\n.ps-cat-ico svg { width: 15px; height: 15px; }\n.ps-cat .ps-cat-text { display: flex; flex-direction: column; gap: 1px; }\n.ps-cat .ps-cat-lbl { font-size: 10.5px; color: #6B6B72; font-weight: 600; }\n.ps-cat .ps-cat-val { font-size: 13px; font-weight: 800; color: #16161A; letter-spacing: -.01em; }\n.ps-cat.dim .ps-cat-val { color: #B5B5BC; }\n.ps-cat.is-tap {\n  border-color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(59,79,224,.12), 0 6px 18px -4px rgba(59,79,224,.4);\n  transform: scale(1.03);\n  transition: transform .3s, box-shadow .3s;\n}\n\n/* Back row */\n.ps-back {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 13px; font-weight: 600; color: #16161A;\n}\n.ps-back svg { width: 18px; height: 18px; }\n\n/* Sub-category breakdown */\n.ps-bars {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 14px; padding: 12px 13px;\n  display: flex; flex-direction: column; gap: 9px;\n}\n.ps-bars .ps-bars-t { font-size: 11.5px; font-weight: 700; color: #16161A; }\n.ps-bar { display: grid; grid-template-columns: 60px 1fr 56px; gap: 8px; align-items: center; font-size: 11px; }\n.ps-bar .pb-lbl { color: #6B6B72; }\n.ps-bar .pb-track { height: 6px; background: rgba(15,15,20,.06); border-radius: 999px; overflow: hidden; position: relative; }\n.ps-bar .pb-fill { position: absolute; inset: 0 auto 0 0; width: var(--w, 50%); border-radius: 999px; background: var(--primary); transform-origin: left; animation: psBarGrow .9s cubic-bezier(.22,.61,.36,1) both; }\n@keyframes psBarGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }\n.ps-bar .pb-val { text-align: right; font-weight: 700; color: #16161A; }\n\n/* Top items list */\n.ps-items {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 14px; padding: 10px 13px;\n  display: flex; flex-direction: column; gap: 6px;\n  font-size: 11.5px;\n}\n.ps-items-t { font-size: 11.5px; font-weight: 700; color: #16161A; margin-bottom: 3px; }\n.ps-items-row { display: flex; justify-content: space-between; color: #16161A; }\n.ps-items-row span:last-child { color: #6B6B72; font-weight: 600; }\n\n/* AI insight card */\n.ps-ai {\n  background: linear-gradient(150deg, #3B4FE0, #6577FF);\n  color: #fff;\n  border-radius: 16px;\n  padding: 14px 14px;\n  box-shadow: 0 10px 22px -8px rgba(59,79,224,.55);\n}\n.ps-ai-head { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; opacity: .92; }\n.ps-ai-head svg { width: 14px; height: 14px; }\n.ps-ai-body { margin-top: 8px; font-size: 12.5px; line-height: 1.45; }\n.ps-ai-body b { font-weight: 700; }\n.ps-ai-tags { display: flex; gap: 6px; margin-top: 10px; }\n.ps-ai-tag {\n  font-size: 10px; font-weight: 700;\n  padding: 4px 9px; border-radius: 999px;\n  background: rgba(255,255,255,.18);\n  letter-spacing: .03em;\n}\n\n/* Chat bubbles inside phone */\n.ps-bubble {\n  font-size: 12px; line-height: 1.45;\n  border-radius: 14px 14px 14px 4px;\n  padding: 9px 11px;\n  background: #fff;\n  border: 1px solid rgba(15,15,20,.08);\n  max-width: 92%;\n  word-break: break-word;\n}\n.ps-bubble.me {\n  align-self: flex-end;\n  background: var(--primary); color: #fff;\n  border-color: transparent;\n  border-radius: 14px 14px 4px 14px;\n}\n.ps-bubble.danger {\n  background: linear-gradient(150deg, #E15252, #B83838);\n  color: #fff; border-color: transparent;\n  box-shadow: 0 10px 22px -10px rgba(209,67,67,.6);\n}\n.ps-bubble.danger b { display: block; font-size: 13px; margin-bottom: 4px; }\n\n/* Verdict ribbon */\n.ps-verdict {\n  background: linear-gradient(150deg, #E15252, #B83838);\n  color: #fff; border-radius: 14px; padding: 12px;\n  display: flex; align-items: center; gap: 10px;\n}\n.ps-verdict-ico {\n  width: 32px; height: 32px; border-radius: 10px;\n  background: rgba(255,255,255,.18);\n  display: grid; place-items: center;\n}\n.ps-verdict-ico svg { width: 18px; height: 18px; }\n.ps-verdict-t { font-weight: 800; font-size: 13.5px; }\n.ps-verdict-s { font-size: 11px; opacity: .9; }\n\n/* Analyze stages mini */\n.ps-stages {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 14px; padding: 10px 12px;\n  display: flex; flex-direction: column; gap: 7px;\n}\n.ps-stage-row {\n  display: flex; align-items: center; gap: 9px;\n  font-size: 11.5px; color: #16161A; font-weight: 600;\n  opacity: .42;\n  transition: opacity .35s ease;\n}\n.ps-stage-row.on { opacity: 1; }\n.ps-stage-row .ss-ico {\n  width: 22px; height: 22px; border-radius: 7px;\n  background: rgba(15,15,20,.05);\n  color: #6B6B72;\n  display: grid; place-items: center; flex: none;\n}\n.ps-stage-row .ss-ico svg { width: 12px; height: 12px; }\n.ps-stage-row.on .ss-ico { background: var(--scam); color: #fff; }\n.ps-stage-row .ss-check {\n  margin-left: auto;\n  width: 16px; height: 16px;\n  display: grid; place-items: center;\n  color: var(--success);\n}\n.ps-stage-row .ss-check svg { width: 13px; height: 13px; }\n\n/* Composer at bottom */\n.ps-composer {\n  margin-top: auto;\n  background: #fff; border: 1px solid rgba(15,15,20,.08);\n  border-radius: 14px; padding: 9px 10px;\n  display: flex; align-items: center; gap: 8px;\n  font-size: 12px; color: #6B6B72;\n}\n.ps-composer-send {\n  margin-left: auto;\n  width: 30px; height: 30px; border-radius: 9px;\n  background: var(--primary); color: #fff;\n  display: grid; place-items: center;\n}\n.ps-composer-send svg { width: 15px; height: 15px; }\n\n/* Mode bar — 4 input methods */\n.ps-modes {\n  display: grid; grid-template-columns: repeat(4, 1fr);\n  gap: 6px;\n}\n.ps-mode {\n  background: #fff; border: 1px solid rgba(15,15,20,.08);\n  border-radius: 12px;\n  padding: 10px 6px;\n  display: flex; flex-direction: column; align-items: center; gap: 4px;\n  font-size: 10.5px; font-weight: 600; color: #6B6B72;\n  transition: all .35s ease;\n}\n.ps-mode svg { width: 17px; height: 17px; color: #6B6B72; transition: color .35s; }\n.ps-mode.on {\n  background: linear-gradient(155deg, #2E8E73, #156E54);\n  color: #fff; border-color: transparent;\n  transform: translateY(-2px) scale(1.03);\n  box-shadow: 0 10px 22px -10px rgba(46,142,115,.6);\n}\n.ps-mode.on svg { color: #fff; }\n\n/* Voice viz */\n.ps-voice {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 16px; padding: 18px 16px;\n  display: flex; flex-direction: column; align-items: center; gap: 12px;\n  text-align: center;\n}\n.ps-voice-mic {\n  width: 64px; height: 64px; border-radius: 50%;\n  background: linear-gradient(150deg, #2E8E73, #156E54);\n  color: #fff; display: grid; place-items: center;\n  position: relative;\n}\n.ps-voice-mic::before,\n.ps-voice-mic::after {\n  content: \"\"; position: absolute; inset: -8px;\n  border-radius: 50%;\n  border: 2px solid rgba(46,142,115,.4);\n  animation: vmRing 1.6s ease-out infinite;\n}\n.ps-voice-mic::after { animation-delay: .8s; }\n@keyframes vmRing {\n  0% { transform: scale(.85); opacity: 1; }\n  100% { transform: scale(1.4); opacity: 0; }\n}\n.ps-voice-mic svg { width: 28px; height: 28px; }\n.ps-wave {\n  display: flex; align-items: center; gap: 4px;\n  height: 28px;\n}\n.ps-wave i {\n  display: block; width: 3px; border-radius: 2px;\n  background: var(--health-b);\n  animation: wave 1s ease-in-out infinite;\n}\n.ps-wave i:nth-child(1) { height: 30%; animation-delay: 0s; }\n.ps-wave i:nth-child(2) { height: 70%; animation-delay: .1s; }\n.ps-wave i:nth-child(3) { height: 50%; animation-delay: .2s; }\n.ps-wave i:nth-child(4) { height: 90%; animation-delay: .3s; }\n.ps-wave i:nth-child(5) { height: 60%; animation-delay: .4s; }\n.ps-wave i:nth-child(6) { height: 80%; animation-delay: .5s; }\n.ps-wave i:nth-child(7) { height: 40%; animation-delay: .6s; }\n.ps-wave i:nth-child(8) { height: 70%; animation-delay: .7s; }\n.ps-wave i:nth-child(9) { height: 30%; animation-delay: .8s; }\n.ps-wave i:nth-child(10) { height: 50%; animation-delay: .9s; }\n@keyframes wave {\n  0%, 100% { transform: scaleY(.6); opacity: .6; }\n  50%      { transform: scaleY(1); opacity: 1; }\n}\n.ps-voice-cap { font-size: 11.5px; color: #6B6B72; }\n.ps-voice-cap b { color: #16161A; font-weight: 700; }\n\n/* Photo viewfinder */\n.ps-photo {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 16px; padding: 12px;\n  display: flex; flex-direction: column; gap: 8px;\n}\n.ps-photo-frame {\n  position: relative;\n  background: repeating-linear-gradient(45deg, #F2F2EC 0 8px, #FAFAF7 8px 16px);\n  border-radius: 12px;\n  aspect-ratio: 4/3;\n  display: grid; place-items: center;\n}\n.ps-photo-receipt {\n  width: 64%; background: #fff;\n  border-radius: 6px;\n  padding: 10px 12px;\n  box-shadow: 0 6px 14px -4px rgba(0,0,0,.18);\n  font-family: ui-monospace, \"SF Mono\", monospace;\n  font-size: 8.5px; color: #16161A;\n  line-height: 1.55;\n  transform: rotate(-3deg);\n}\n.ps-photo-receipt b { display: block; font-size: 9.5px; }\n.ps-photo-corner {\n  position: absolute; width: 18px; height: 18px;\n  border: 2px solid var(--health-b);\n}\n.ps-photo-corner.tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; border-top-left-radius: 4px; }\n.ps-photo-corner.tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; border-top-right-radius: 4px; }\n.ps-photo-corner.bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; border-bottom-left-radius: 4px; }\n.ps-photo-corner.br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; border-bottom-right-radius: 4px; }\n\n.ps-photo-recog {\n  display: flex; align-items: center; gap: 8px;\n  background: rgba(46,142,115,.10);\n  border-radius: 10px; padding: 8px 10px;\n  font-size: 11.5px; color: #156E54; font-weight: 600;\n}\n.ps-photo-recog svg { width: 14px; height: 14px; }\n.ps-photo-recog .ph-amount { margin-left: auto; font-weight: 800; }\n\n/* File card */\n.ps-file {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 14px; padding: 12px;\n  display: flex; align-items: center; gap: 11px;\n}\n.ps-file-ico {\n  flex: none; width: 42px; height: 50px;\n  border-radius: 7px;\n  background: linear-gradient(160deg, #6577FF, #3B4FE0);\n  color: #fff; display: grid; place-items: center;\n  position: relative;\n}\n.ps-file-ico::before {\n  content: \"\"; position: absolute; top: 0; right: 0;\n  width: 12px; height: 12px;\n  background: linear-gradient(225deg, transparent 50%, #fff 50%);\n  border-radius: 0 7px 0 6px;\n}\n.ps-file-ico svg { width: 18px; height: 18px; }\n.ps-file-t { font-size: 12.5px; font-weight: 700; color: #16161A; }\n.ps-file-s { font-size: 10.5px; color: #6B6B72; margin-top: 2px; }\n.ps-file-progress { margin-top: 6px; height: 4px; background: rgba(15,15,20,.06); border-radius: 999px; overflow: hidden; }\n.ps-file-progress span { display: block; height: 100%; background: var(--primary); width: 78%; }\n.ps-file-status { font-size: 10.5px; color: var(--success); font-weight: 700; margin-left: auto; }\n.ps-file-status svg { width: 14px; height: 14px; vertical-align: -2px; margin-right: 4px; }\n\n/* Section header inside phone */\n.ps-head {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 2px 2px;\n}\n.ps-head h4 { font-size: 16px; font-weight: 800; letter-spacing: -.02em; color: #16161A; }\n.ps-head .ps-head-sub { font-size: 11px; color: #6B6B72; }\n.ps-head svg { width: 18px; height: 18px; color: #16161A; }\n\n/* small ai loading dots */\n.ps-typing {\n  display: inline-flex; align-items: center; gap: 4px;\n  font-size: 11px; color: #6B6B72; padding: 6px 11px;\n  background: rgba(15,15,20,.04);\n  border-radius: 999px;\n}\n.ps-typing i { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); animation: ttp 1.2s infinite; }\n.ps-typing i:nth-child(2) { animation-delay: .2s; }\n.ps-typing i:nth-child(3) { animation-delay: .4s; }\n@keyframes ttp {\n  0%,80%,100% { opacity: .25; transform: translateY(0); }\n  40%         { opacity: 1; transform: translateY(-3px); }\n}\n\n/* ============================================================\n   CHAOS → ORDER\n   ============================================================ */\n.chaos-tell { padding-top: 0; padding-bottom: 0; }\n.chaos-tell .section-head { padding-bottom: clamp(28px,4vw,56px); }\n\n.cs-stage {\n  position: relative;\n  height: 260vh;\n}\n.cs-sticky {\n  position: sticky; top: 0;\n  height: 100vh;\n  display: flex; align-items: center; justify-content: center;\n  overflow: hidden;\n}\n.cs-frame {\n  width: 100%;\n  display: flex; flex-direction: column;\n  align-items: center;\n  gap: clamp(20px, 3vw, 40px);\n}\n\n.cs-headers { position: relative; text-align: center; min-height: 64px; width: 100%; }\n.cs-headers h3 {\n  position: absolute; left: 50%; top: 0;\n  transform: translateX(-50%);\n  font-size: clamp(20px, 2.4vw, 28px); font-weight: 700;\n  letter-spacing: -.02em;\n  transition: opacity .5s ease, transform .5s cubic-bezier(.22,.61,.36,1);\n  white-space: nowrap;\n}\n.cs-headers h3 .sub {\n  display: block; font-size: clamp(13px, 1.2vw, 15px);\n  color: var(--text-muted); margin-top: 4px; font-weight: 500;\n}\n.cs-headers h3.before { color: var(--scam); opacity: 1; }\n.cs-headers h3.after  { color: var(--primary); opacity: 0; transform: translate(-50%, 10px); }\n.cs-canvas[data-state=\"ordered\"] ~ .cs-headers h3.before,\n.cs-canvas.ordered ~ .cs-headers h3.before { opacity: 0; transform: translate(-50%, -10px); }\n/* easier: drive via dataset on canvas */\n\n.cs-canvas {\n  position: relative;\n  width: min(880px, 100%);\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-hero);\n  padding: clamp(20px, 3vw, 36px);\n  box-shadow: var(--sh-sm);\n  transition: background .8s ease, box-shadow .8s ease, border-color .8s ease;\n  /* --p drives interpolation (0=chaos, 1=order) */\n  --p: 0;\n}\n.cs-canvas[data-state=\"ordered\"] {\n  background: linear-gradient(160deg, #EEF1FE, #E8ECFE);\n  border-color: rgba(59,79,224,.22);\n  box-shadow: var(--sh-md);\n}\n\n.cs-row {\n  display: grid;\n  grid-template-columns: clamp(120px, 16vw, 180px) 1fr;\n  align-items: center;\n  gap: clamp(12px, 1.6vw, 20px);\n  padding: clamp(10px, 1.4vw, 16px) 0;\n  border-top: 1px solid transparent;\n  transition: border-color .6s ease;\n  min-height: clamp(56px, 7vw, 76px);\n}\n.cs-row + .cs-row { border-top-color: transparent; }\n.cs-canvas[data-state=\"ordered\"] .cs-row + .cs-row { border-top-color: rgba(15,15,20,.07); }\n\n.cs-row-lbl {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-weight: 700; font-size: clamp(14px, 1.4vw, 16px);\n  letter-spacing: -.01em;\n  opacity: var(--p);\n  transform: translateX(calc(-14px * (1 - var(--p))));\n  transition: none;\n}\n.cs-row-lbl svg { width: 18px; height: 18px; }\n.cs-row[data-cat=\"safety\"]  .cs-row-lbl { color: var(--scam); }\n.cs-row[data-cat=\"health\"]  .cs-row-lbl { color: var(--health-b); }\n.cs-row[data-cat=\"finance\"] .cs-row-lbl { color: var(--primary); }\n.cs-row[data-cat=\"info\"]    .cs-row-lbl { color: #2C2B36; }\n\n.cs-row-items {\n  display: flex;\n  gap: clamp(8px, 1vw, 14px);\n  flex-wrap: wrap;\n  min-height: 44px;\n  align-items: center;\n}\n\n.cs-item {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 10px 14px;\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  font-weight: 600;\n  font-size: clamp(12.5px, 1.1vw, 14px);\n  white-space: nowrap;\n  box-shadow: var(--sh-sm);\n  color: #16161A;\n  transform:\n    translate(\n      calc(var(--dx, 0px) * (1 - var(--p))),\n      calc(var(--dy, 0px) * (1 - var(--p)))\n    )\n    rotate(calc(var(--rot, 0deg) * (1 - var(--p))));\n  will-change: transform;\n  transition: box-shadow .5s ease, filter .5s ease;\n}\n.cs-canvas[data-state=\"ordered\"] .cs-item {\n  box-shadow: 0 4px 14px -6px rgba(15,15,20,.14);\n}\n.cs-item svg { width: 16px; height: 16px; flex: none; }\n.cs-row[data-cat=\"safety\"]  .cs-item svg { color: var(--scam); }\n.cs-row[data-cat=\"health\"]  .cs-item svg { color: var(--health-b); }\n.cs-row[data-cat=\"finance\"] .cs-item svg { color: var(--primary); }\n.cs-row[data-cat=\"info\"]    .cs-item svg { color: #2C2B36; }\n\n/* outer caption (before / after) — separate from canvas */\n.cs-caption {\n  text-align: center;\n  font-size: clamp(14px, 1.4vw, 16px);\n  font-weight: 600;\n  position: relative;\n  min-height: 28px;\n}\n.cs-caption .before, .cs-caption .after {\n  position: absolute; left: 50%; transform: translateX(-50%);\n  transition: opacity .55s ease, transform .55s cubic-bezier(.22,.61,.36,1);\n  white-space: nowrap;\n}\n.cs-caption .before {\n  color: var(--scam);\n  opacity: var(--cap-before, 1);\n}\n.cs-caption .after {\n  color: var(--primary);\n  opacity: var(--cap-after, 0);\n}\n\n.cs-scroll-hint {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 13px; color: var(--text-muted);\n  opacity: calc(1 - var(--p));\n  transition: opacity .35s ease;\n}\n.cs-scroll-hint svg { width: 16px; height: 16px; animation: csBounce 1.6s ease-in-out infinite; }\n@keyframes csBounce {\n  0%,100% { transform: translateY(0); }\n  50%     { transform: translateY(4px); }\n}\n\n@media (max-width: 720px) {\n  .cs-stage { height: 280vh; }\n  .cs-row { grid-template-columns: 1fr; gap: 6px; min-height: auto; padding: 12px 0; }\n  .cs-row-lbl { padding-left: 2px; }\n  .cs-item { font-size: 12px; padding: 8px 11px; }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  .pt-scene { transition: none; }\n  .pt-chap { transition: none; }\n  .cs-item { transform: none !important; }\n  .cs-row-lbl { opacity: 1; transform: none; }\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   OkTolk v4 — overrides + new components\n   - Single rotating right card (.pt-side)\n   - Bigger, interactive chaos block\n   - Agent Search sticky scene\n   - Phone: chart, search bar, search-best card\n   ============================================================ */\n\n/* ============================================================\n   0) Principles stage — taller because 16 frames now\n   ============================================================ */\n.pt-stage { height: 640vh; }\n@media (max-width: 880px) {\n  .pt-stage { height: 720vh; }\n}\n\n/* === HIDE the pt-rail (no CSS was written for it, icons floated) === */\n.pt-rail { display: none !important; }\n\n/* ============================================================\n   PHONE BEZEL UPGRADE — more realistic, wow-quality\n   ============================================================ */\n/* Override the base phone from scrollytelling.css */\n.pt-phone {\n  position: relative;\n  width: clamp(220px, 17vw, 260px);\n  /* polished dark metal frame */\n  background: linear-gradient(160deg, #2A2A2E 0%, #1C1C20 40%, #111114 100%);\n  border-radius: 54px;\n  padding: 10px;\n  /* multi-layer shadow for depth */\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,.10) inset,\n    0 0 0 1px rgba(0,0,0,.8),\n    0 2px 0 0 rgba(255,255,255,.06) inset,\n    0 -1px 0 0 rgba(0,0,0,.6) inset,\n    0 40px 80px -16px rgba(0,0,0,.70),\n    0 16px 32px -8px rgba(0,0,0,.45),\n    0 4px 12px -2px rgba(0,0,0,.30);\n}\n/* Side button glints */\n.pt-phone::before {\n  content: \"\";\n  position: absolute;\n  right: -3px; top: 28%;\n  width: 3px; height: 22%;\n  background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.15), rgba(255,255,255,.06));\n  border-radius: 0 3px 3px 0;\n}\n/* Remove old simple notch, replaced by Dynamic Island */\n.pt-phone::after { display: none !important; }\n\n/* Phone screen inner glow */\n.pt-phone-screen {\n  border-radius: 46px;\n  background: #FAFAF7;\n  aspect-ratio: 320 / 660;\n  overflow: hidden;\n  position: relative;\n  /* screen edge shine */\n  box-shadow:\n    0 0 0 1px rgba(0,0,0,.25) inset,\n    0 0 28px 0 rgba(59,79,224,.08) inset;\n}\n\n/* Dynamic Island (replaces old notch ::after) */\n.pt-statusbar {\n  position: absolute; top: 0; left: 0; right: 0;\n  height: 46px;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 22px;\n  font-size: 12px; font-weight: 700;\n  color: #16161A;\n  z-index: 8;\n}\n.pt-statusbar::after {\n  content: \"\";\n  position: absolute;\n  top: 10px; left: 50%; transform: translateX(-50%);\n  width: 100px; height: 28px;\n  background: #111114;\n  border-radius: 999px;\n  z-index: 9;\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,.08) inset,\n    0 2px 8px -2px rgba(0,0,0,.6);\n}\n/* Battery/signal icons on status bar */\n.pt-statusbar .pt-sb-right {\n  display: flex; align-items: center; gap: 5px;\n  font-size: 10px; font-weight: 700;\n  z-index: 8;\n}\n.pt-sb-signal {\n  display: inline-flex; align-items: flex-end; gap: 1.5px; height: 10px;\n}\n.pt-sb-signal span {\n  display: block; width: 2.5px; background: #16161A; border-radius: 1px;\n}\n.pt-sb-signal span:nth-child(1) { height: 30%; }\n.pt-sb-signal span:nth-child(2) { height: 55%; }\n.pt-sb-signal span:nth-child(3) { height: 80%; }\n.pt-sb-signal span:nth-child(4) { height: 100%; }\n.pt-sb-battery {\n  display: inline-flex; align-items: center;\n  gap: 1px;\n}\n.pt-sb-battery-body {\n  width: 20px; height: 10px; border-radius: 2px;\n  border: 1.5px solid rgba(15,15,20,.4);\n  position: relative;\n  background: transparent;\n}\n.pt-sb-battery-fill {\n  position: absolute; inset: 1px 3px 1px 1px;\n  background: #16161A; border-radius: 1px;\n}\n.pt-sb-battery-tip {\n  width: 2px; height: 5px; border-radius: 0 1px 1px 0;\n  background: rgba(15,15,20,.4);\n}\n\n/* Scenes container adjusted for taller status bar */\n.pt-scenes { inset: 46px 0 54px !important; }\n\n/* Screen subtle light reflection at top */\n.pt-phone-screen::before {\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 40%;\n  background: linear-gradient(180deg, rgba(255,255,255,.06) 0%, transparent 100%);\n  pointer-events: none;\n  z-index: 10;\n  border-radius: 46px 46px 0 0;\n}\n\n/* Home indicator at bottom */\n.pt-tabbar {\n  padding-bottom: 6px;\n}\n.pt-tabbar::after {\n  content: \"\";\n  display: block;\n  position: absolute;\n  bottom: 5px; left: 50%; transform: translateX(-50%);\n  width: 38%; height: 4px;\n  background: #16161A;\n  border-radius: 999px;\n  opacity: .20;\n}\n\n/* ============================================================\n   1) RIGHT-SIDE: single rotating card (replaces .pt-chapters)\n   ============================================================ */\n.pt-side {\n  position: relative;\n  min-height: clamp(380px, 46vh, 520px);\n  display: flex; align-items: center;\n}\n.pt-side-shell {\n  position: relative;\n  width: 100%;\n  min-height: clamp(380px, 46vh, 520px);\n}\n.pt-card {\n  position: absolute; inset: 0;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-card);\n  padding: clamp(24px, 2.6vw, 38px);\n  display: flex; flex-direction: column; gap: 14px;\n  opacity: 0;\n  transform: translateY(20px) scale(.985);\n  transition:\n    opacity .55s ease,\n    transform .55s cubic-bezier(.22,.61,.36,1),\n    background .55s ease,\n    border-color .55s ease;\n  pointer-events: none;\n  will-change: opacity, transform;\n}\n.pt-card.on {\n  opacity: 1; transform: none;\n  pointer-events: auto;\n  box-shadow: var(--sh-md);\n}\n.pt-card[data-section=\"home\"].on {\n  background: linear-gradient(160deg, #F4F4EF, #ECECE5);\n}\n.pt-card[data-section=\"health\"].on {\n  background: linear-gradient(160deg, #E6F2EC, #D6EDE0);\n  border-color: rgba(46,142,115,.25);\n}\n.pt-card[data-section=\"finance\"].on {\n  background: linear-gradient(160deg, #EEF1FE, #E2E7FD);\n  border-color: rgba(59,79,224,.22);\n}\n.pt-card[data-section=\"scam\"].on {\n  background: linear-gradient(160deg, #FCEDED, #F7DEDE);\n  border-color: rgba(209,67,67,.22);\n}\n.pt-card[data-section=\"chat\"].on {\n  background: linear-gradient(160deg, #F4F0FB, #E9E2F8);\n  border-color: rgba(122,75,224,.22);\n}\n.pt-card[data-section=\"search\"].on {\n  background: linear-gradient(160deg, #FFF4E8, #FFE6CF);\n  border-color: rgba(217,128,46,.25);\n}\n\n.pt-card-head { display: flex; align-items: center; gap: 16px; }\n.pt-card-num {\n  flex: none;\n  width: 58px; height: 58px; border-radius: 17px;\n  display: grid; place-items: center;\n}\n.pt-card-num svg { width: 28px; height: 28px; }\n.pc-health  { background: rgba(46,142,115,.20); color: var(--health-b); }\n.pc-finance { background: rgba(59,79,224,.16); color: var(--primary); }\n.pc-scam    { background: rgba(209,67,67,.18); color: var(--scam); }\n.pc-chat    { background: rgba(122,75,224,.18); color: #7A4BE0; }\n.pc-search  { background: rgba(217,128,46,.18); color: #C0701F; }\n\n.pt-card-tag {\n  font-size: 12.5px; font-weight: 700;\n  letter-spacing: .08em; text-transform: uppercase;\n  color: var(--text-muted);\n}\n.pt-card-tag-health  { color: var(--health-b); }\n.pt-card-tag-finance { color: var(--primary); }\n.pt-card-tag-scam    { color: var(--scam); }\n.pt-card-tag-chat    { color: #7A4BE0; }\n.pt-card-tag-search  { color: #C0701F; }\n\n.pt-card h3 {\n  font-size: clamp(22px, 2.4vw, 30px);\n  letter-spacing: -.02em;\n  line-height: 1.18;\n  margin-top: 2px;\n}\n.pt-card p {\n  color: var(--text-muted);\n  font-size: clamp(15px, 1.4vw, 16.5px);\n  line-height: 1.55;\n}\n\n/* sub-step pills inside card */\n.pt-steps {\n  display: flex; gap: 6px; flex-wrap: wrap;\n  margin-top: 6px;\n}\n.pt-step {\n  font-size: 11.5px; font-weight: 600;\n  padding: 6px 11px;\n  background: rgba(15,15,20,.05);\n  color: var(--text-muted);\n  border-radius: 999px;\n  border: 1px solid transparent;\n  transition: background .35s ease, color .35s ease, transform .35s ease, border-color .35s ease;\n}\n.pt-step.on {\n  background: #fff;\n  color: #16161A;\n  border-color: rgba(15,15,20,.10);\n  transform: translateY(-1px);\n  box-shadow: 0 4px 10px -4px rgba(15,15,20,.18);\n}\n.pt-card[data-section=\"health\"]  .pt-step.on { color: var(--health-b); border-color: rgba(46,142,115,.30); }\n.pt-card[data-section=\"finance\"] .pt-step.on { color: var(--primary);  border-color: rgba(59,79,224,.30); }\n.pt-card[data-section=\"scam\"]    .pt-step.on { color: var(--scam);     border-color: rgba(209,67,67,.30); }\n.pt-card[data-section=\"chat\"]    .pt-step.on { color: #7A4BE0;          border-color: rgba(122,75,224,.30); }\n.pt-card[data-section=\"search\"]  .pt-step.on { color: #C0701F;          border-color: rgba(217,128,46,.30); }\n\n/* hide old chapter visuals if anything leaks */\n.pt-chapters { display: none !important; }\n\n@media (max-width: 880px) {\n  .pt-side, .pt-side-shell { min-height: 360px; }\n  .pt-card { padding: 20px 18px; }\n  .pt-card h3 { font-size: 19px; }\n  .pt-card p { font-size: 14.5px; }\n}\n\n/* ============================================================\n   2) Phone-scene additions: chart, search bar, search-best\n   ============================================================ */\n.ps-chart {\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 14px; padding: 10px 12px 8px;\n  display: flex; flex-direction: column; gap: 6px;\n}\n.ps-chart-head {\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 11.5px; color: #16161A;\n}\n.ps-chart-head b { font-weight: 700; }\n.ps-chart-pill {\n  font-size: 10px; font-weight: 700;\n  padding: 3px 8px; border-radius: 999px;\n  background: rgba(59,79,224,.10); color: var(--primary);\n}\n.ps-chart-pill.green { background: rgba(46,142,115,.10); color: var(--health-b); }\n.ps-chart-svg {\n  width: 100%; height: 88px;\n}\n.ps-chart-axis {\n  display: flex; justify-content: space-between;\n  font-size: 9px; color: #9A9AA1; padding: 0 1px;\n}\n\n/* search bar inside phone */\n.ps-searchbar {\n  display: flex; align-items: center; gap: 8px;\n  background: #fff; border: 1px solid rgba(15,15,20,.10);\n  border-radius: 12px; padding: 10px 12px;\n  font-size: 12px;\n}\n.ps-searchbar.small { padding: 8px 10px; }\n.ps-searchbar svg { width: 15px; height: 15px; color: #9A9AA1; flex: none; }\n.ps-searchbar .pss-q {\n  color: #16161A; font-weight: 600;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  flex: 1;\n}\n.ps-searchbar .pss-cursor {\n  width: 1.5px; height: 13px; background: var(--primary);\n  animation: pssBlink 1s steps(2) infinite;\n}\n@keyframes pssBlink {\n  50% { opacity: 0; }\n}\n\n.ps-search-stages {\n  display: flex; flex-direction: column; gap: 5px;\n  background: #fff; border: 1px solid rgba(15,15,20,.07);\n  border-radius: 12px; padding: 9px 11px;\n}\n.pss-row {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 11px; font-weight: 600; color: #6B6B72;\n  opacity: .45;\n  transition: opacity .3s ease;\n}\n.pss-row.on { opacity: 1; color: #16161A; }\n.pss-dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: rgba(15,15,20,.15);\n  flex: none;\n}\n.pss-row.on .pss-dot {\n  background: #C0701F;\n  box-shadow: 0 0 0 4px rgba(217,128,46,.18);\n}\n.pss-tail {\n  margin-left: auto; color: #9A9AA1; font-weight: 600;\n}\n\n/* search \"best\" result card */\n.ps-search-best {\n  background: linear-gradient(155deg, #FFF4E8, #FFE6CF);\n  border: 1px solid rgba(217,128,46,.30);\n  border-radius: 14px;\n  padding: 12px 13px;\n  display: flex; flex-direction: column; gap: 4px;\n}\n.psb-tag {\n  display: inline-flex; align-items: center; gap: 5px;\n  align-self: flex-start;\n  font-size: 9.5px; font-weight: 800; letter-spacing: .12em;\n  text-transform: uppercase;\n  padding: 4px 8px; border-radius: 999px;\n  background: #C0701F; color: #fff;\n}\n.psb-tag svg { width: 11px; height: 11px; }\n.psb-name { font-size: 13.5px; font-weight: 800; color: #16161A; margin-top: 4px; }\n.psb-meta { font-size: 10.5px; color: #6B6B72; }\n.psb-price {\n  display: flex; align-items: baseline; gap: 8px;\n  margin-top: 4px;\n}\n.psb-price b {\n  font-size: 18px; font-weight: 800; color: #C0701F; letter-spacing: -.02em;\n}\n.psb-price span {\n  font-size: 10px; color: #6B6B72; font-weight: 600;\n}\n\n/* ============================================================\n   3) Bigger / interactive Chaos block\n   ============================================================ */\n.chaos-tell .cs-stage { height: 440vh; }\n.cs-canvas {\n  width: min(1140px, 100%);\n  padding: clamp(28px, 3.4vw, 56px);\n  border-radius: clamp(22px, 2vw, 32px);\n}\n.cs-row {\n  grid-template-columns: clamp(140px, 17vw, 200px) 1fr;\n  gap: clamp(14px, 2vw, 28px);\n  padding: clamp(14px, 1.8vw, 22px) 0;\n  min-height: clamp(72px, 9vw, 96px);\n}\n.cs-row-lbl {\n  font-size: clamp(15px, 1.6vw, 18px);\n}\n.cs-row-lbl svg { width: 22px; height: 22px; }\n.cs-item {\n  font-size: clamp(13.5px, 1.25vw, 15.5px);\n  padding: 12px 16px;\n  gap: 10px;\n  cursor: grab;\n  /* hover lift only in ordered state */\n}\n.cs-canvas[data-state=\"ordered\"] .cs-item:hover {\n  transform:\n    translate(var(--dx, 0px), var(--dy, 0px))\n    rotate(var(--rot, 0deg))\n    translateY(-3px) scale(1.035);\n  box-shadow: 0 12px 26px -10px rgba(15,15,20,.22);\n  border-color: rgba(59,79,224,.35);\n  z-index: 2;\n}\n.cs-canvas[data-state=\"ordered\"] .cs-row[data-cat=\"safety\"]  .cs-item:hover { border-color: rgba(209,67,67,.35); }\n.cs-canvas[data-state=\"ordered\"] .cs-row[data-cat=\"health\"]  .cs-item:hover { border-color: rgba(46,142,115,.35); }\n.cs-canvas[data-state=\"ordered\"] .cs-row[data-cat=\"finance\"] .cs-item:hover { border-color: rgba(59,79,224,.35); }\n.cs-canvas[data-state=\"ordered\"] .cs-row[data-cat=\"info\"]    .cs-item:hover { border-color: rgba(15,15,20,.30); }\n\n.cs-replay {\n  margin-top: 18px;\n  display: inline-flex; align-items: center; gap: 8px;\n  background: #fff; border: 1px solid var(--line);\n  border-radius: 999px; padding: 10px 18px;\n  font: 600 14px var(--font, \"Onest\"), system-ui;\n  color: #16161A; cursor: pointer;\n  opacity: calc(var(--p, 0));\n  pointer-events: none;\n  transition: opacity .4s ease, background .25s ease, transform .25s ease;\n  box-shadow: var(--sh-sm);\n}\n.cs-canvas[data-state=\"ordered\"] ~ .cs-replay,\n.cs-stage .cs-replay {\n  /* enable based on parent state via :has fallback */\n}\n.cs-replay svg { width: 16px; height: 16px; }\n.cs-replay:hover { background: #FAFAF7; transform: translateY(-1px); }\n.cs-canvas[data-state=\"ordered\"] ~ * .cs-replay { opacity: 1; pointer-events: auto; }\n/* simpler — show replay button when stage data-show-replay is set */\n.cs-stage[data-show-replay=\"1\"] .cs-replay { opacity: 1; pointer-events: auto; }\n.cs-stage:not([data-show-replay=\"1\"]) .cs-replay { opacity: 0; pointer-events: none; }\n\n@media (max-width: 720px) {\n  .cs-canvas { padding: 20px 16px; }\n  .cs-row { grid-template-columns: 1fr; min-height: auto; padding: 12px 0; }\n  .cs-item { font-size: 12.5px; padding: 9px 12px; }\n}\n\n/* ============================================================\n   4) Agent Search — sticky scrolly\n   ============================================================ */\n.agent-tell { padding-top: 0; padding-bottom: 0; }\n.agent-tell .section-head { padding-bottom: clamp(28px, 4vw, 56px); }\n\n.ag-stage {\n  position: relative;\n  height: 360vh;\n}\n.ag-sticky {\n  position: sticky; top: 0;\n  height: 100vh;\n  display: flex; align-items: center;\n  overflow: hidden;\n}\n.ag-frame {\n  display: grid;\n  grid-template-columns: minmax(320px, 1fr) 1.15fr;\n  gap: clamp(28px, 4vw, 64px);\n  align-items: center;\n  width: 100%;\n}\n\n/* LEFT: query + result */\n.ag-left {\n  display: flex; flex-direction: column;\n  gap: clamp(16px, 1.8vw, 26px);\n}\n.ag-query {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-card);\n  padding: clamp(20px, 2.2vw, 30px);\n  display: flex; flex-direction: column; gap: 8px;\n}\n.ag-q-head {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 12px; font-weight: 700; letter-spacing: .08em;\n  text-transform: uppercase; color: var(--text-muted);\n}\n.ag-q-head svg { width: 15px; height: 15px; }\n.ag-q-text {\n  font-size: clamp(20px, 2.1vw, 26px);\n  font-weight: 700; letter-spacing: -.015em;\n  color: #16161A;\n  line-height: 1.25;\n}\n.ag-q-meta {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 13px; color: var(--text-muted);\n}\n.ag-q-meta svg { width: 14px; height: 14px; }\n\n.ag-result {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-card);\n  padding: clamp(20px, 2.2vw, 28px);\n  display: flex; flex-direction: column; gap: 12px;\n  opacity: 0;\n  transform: translateY(20px) scale(.985);\n  transition: opacity .55s ease, transform .55s cubic-bezier(.22,.61,.36,1);\n}\n.ag-result.on {\n  opacity: 1; transform: none;\n  background: linear-gradient(160deg, #EEF1FE, #E2E7FD);\n  border-color: rgba(59,79,224,.25);\n  box-shadow: var(--sh-md);\n}\n.ag-result-tag {\n  display: inline-flex; align-items: center; gap: 6px;\n  align-self: flex-start;\n  font-size: 11px; font-weight: 800; letter-spacing: .12em;\n  text-transform: uppercase;\n  padding: 5px 11px; border-radius: 999px;\n  background: var(--primary); color: #fff;\n}\n.ag-result-tag svg { width: 13px; height: 13px; }\n.ag-result-card {\n  background: #fff; border: 1px solid rgba(15,15,20,.06);\n  border-radius: 14px; padding: 16px;\n  display: flex; flex-direction: column; gap: 8px;\n}\n.ag-r-name {\n  font-size: clamp(17px, 1.6vw, 20px);\n  font-weight: 800; color: #16161A;\n}\n.ag-r-meta { font-size: 13px; color: var(--text-muted); }\n.ag-r-row {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 12px; margin-top: 4px;\n}\n.ag-r-price {\n  font-size: clamp(22px, 2vw, 28px); font-weight: 800;\n  color: var(--primary); letter-spacing: -.02em;\n  display: flex; align-items: baseline; gap: 8px;\n}\n.ag-r-price small {\n  font-size: 13px; font-weight: 600; color: #B5B5BC;\n  text-decoration: line-through;\n}\n.ag-r-pill {\n  display: inline-flex; align-items: center; gap: 5px;\n  font-size: 11.5px; font-weight: 700;\n  padding: 5px 10px; border-radius: 999px;\n  background: rgba(46,142,115,.14); color: var(--health-b);\n}\n.ag-r-pill svg { width: 13px; height: 13px; }\n.ag-r-why {\n  font-size: 13.5px; color: #2C2B36; line-height: 1.5;\n  background: rgba(59,79,224,.06); border-radius: 10px;\n  padding: 10px 12px;\n}\n.ag-result-more {\n  display: flex; flex-direction: column; gap: 4px;\n  font-size: 13px;\n}\n.ag-rm-row {\n  display: grid; grid-template-columns: 1fr auto auto;\n  gap: 12px; align-items: center;\n  padding: 8px 10px; border-radius: 10px;\n  background: rgba(255,255,255,.55);\n}\n.ag-rm-row b { color: #16161A; font-weight: 800; }\n.ag-rm-from { color: var(--text-muted); font-size: 12px; }\n\n/* RIGHT: orbit + pipeline */\n.ag-right {\n  display: flex; flex-direction: column;\n  align-items: center;\n  gap: clamp(16px, 2vw, 28px);\n}\n.ag-orbit {\n  position: relative;\n  width: min(440px, 90%);\n  aspect-ratio: 1 / 1;\n  color: var(--primary);\n}\n.ag-lines {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  pointer-events: none;\n}\n.ag-line {\n  stroke-dasharray: 6 6;\n  stroke: rgba(59,79,224,.25);\n  transition: stroke .4s ease, opacity .4s ease;\n  opacity: .5;\n}\n.ag-line.on {\n  stroke: var(--primary);\n  opacity: 1;\n  animation: agLineFlow 1.4s linear infinite;\n}\n@keyframes agLineFlow {\n  to { stroke-dashoffset: -24; }\n}\n\n.ag-core {\n  position: absolute;\n  left: 50%; top: 50%;\n  transform: translate(-50%, -50%);\n  width: clamp(120px, 28%, 160px);\n  height: clamp(120px, 28%, 160px);\n  border-radius: 50%;\n  background: radial-gradient(circle at 30% 30%, #6577FF, #3B4FE0 70%);\n  color: #fff;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 4px;\n  box-shadow: 0 20px 50px -10px rgba(59,79,224,.55);\n  z-index: 3;\n}\n.ag-core-ring,\n.ag-core-ring.r2 {\n  position: absolute; inset: -10px;\n  border-radius: 50%;\n  border: 1.5px solid rgba(59,79,224,.35);\n  animation: agPulse 2.4s ease-out infinite;\n  pointer-events: none;\n}\n.ag-core-ring.r2 { animation-delay: 1.2s; }\n@keyframes agPulse {\n  0% { transform: scale(.9); opacity: 1; }\n  100% { transform: scale(1.55); opacity: 0; }\n}\n.ag-core-glyph {\n  display: grid; place-items: center;\n  width: 38px; height: 38px;\n  border-radius: 12px;\n  background: rgba(255,255,255,.18);\n  margin-bottom: 2px;\n}\n.ag-core-glyph svg { width: 20px; height: 20px; }\n.ag-core-label {\n  font-size: 11px; font-weight: 800;\n  letter-spacing: .08em; text-transform: uppercase;\n  opacity: .85;\n}\n.ag-core-status {\n  font-size: 12.5px; font-weight: 700;\n  padding: 4px 10px; border-radius: 999px;\n  background: rgba(255,255,255,.18);\n  transition: background .35s ease;\n  text-align: center;\n}\n\n/* sources sit on a circle via --angle */\n.ag-source {\n  position: absolute;\n  left: 50%; top: 50%;\n  --radius: 41%;\n  transform:\n    translate(-50%, -50%)\n    rotate(var(--angle, 0deg))\n    translateY(calc(var(--radius) * -1))\n    rotate(calc(var(--angle, 0deg) * -1));\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  padding: 10px 14px;\n  display: inline-flex; align-items: center; gap: 9px;\n  font-size: 12.5px; font-weight: 700; color: #16161A;\n  box-shadow: var(--sh-sm);\n  white-space: nowrap;\n  transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease, background .35s ease;\n  z-index: 2;\n}\n.ag-src-dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: rgba(15,15,20,.18);\n  transition: background .35s ease, box-shadow .35s ease;\n}\n.ag-src-name { font-weight: 700; }\n.ag-src-count {\n  font-size: 11px; color: var(--text-muted); font-weight: 600;\n}\n.ag-source.on {\n  background: linear-gradient(150deg, #EEF1FE, #DDE3FC);\n  border-color: rgba(59,79,224,.35);\n  box-shadow: 0 10px 22px -8px rgba(59,79,224,.40);\n}\n.ag-source.on .ag-src-dot {\n  background: var(--primary);\n  box-shadow: 0 0 0 5px rgba(59,79,224,.18);\n}\n.ag-source.scanned .ag-src-dot {\n  background: var(--health-b);\n}\n\n/* pipeline steps below orbit */\n.ag-pipeline {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px;\n  width: 100%;\n  max-width: 540px;\n}\n.ag-step {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  padding: 12px 12px;\n  display: flex; align-items: center; gap: 9px;\n  font-size: 12.5px;\n  opacity: .42;\n  transition: opacity .35s ease, background .35s ease, border-color .35s ease, transform .35s ease;\n}\n.ag-step.on {\n  opacity: 1;\n  background: linear-gradient(160deg, #EEF1FE, #E2E7FD);\n  border-color: rgba(59,79,224,.30);\n  transform: translateY(-1px);\n}\n.ag-step.done { opacity: .9; }\n.ags-n {\n  flex: none;\n  width: 26px; height: 26px; border-radius: 8px;\n  background: rgba(15,15,20,.07);\n  color: #16161A;\n  display: grid; place-items: center;\n  font-size: 12.5px; font-weight: 800;\n}\n.ag-step.on .ags-n {\n  background: var(--primary); color: #fff;\n}\n.ag-step.done .ags-n {\n  background: var(--health-b); color: #fff;\n}\n.ag-step b { display: block; font-weight: 800; color: #16161A; font-size: 12.5px; line-height: 1.2; }\n.ag-step span { display: block; font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }\n\n@media (max-width: 960px) {\n  .ag-frame { grid-template-columns: 1fr; }\n  .ag-stage { height: 520vh; }\n  .ag-sticky { height: auto; min-height: 100vh; overflow: visible; }\n  .ag-pipeline { grid-template-columns: repeat(2, 1fr); }\n  .ag-source { padding: 8px 11px; font-size: 11.5px; }\n  .ag-src-count { display: none; }\n}\n@media (max-width: 540px) {\n  .ag-orbit { width: 95%; }\n  .ag-pipeline { grid-template-columns: 1fr 1fr; }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  .pt-card, .ag-result, .ag-step, .ag-source { transition: none; }\n  .ag-core-ring, .ag-line.on { animation: none; }\n  .pss-cursor { animation: none; }\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   OkTolk app — inside-the-phone screens (matches real prototype)\n   Used by the scrollytelling phone in OkTolk Landing v4.html\n   ============================================================ */\n\n/* --- color tokens for app ---- */\n:root {\n  --ok-bg:        #FAFAF7;\n  --ok-line:      rgba(15,15,20,.07);\n  --ok-line-2:    rgba(15,15,20,.10);\n  --ok-text:      #16161A;\n  --ok-muted:     #6B6B72;\n  --ok-fadetext:  #9A9AA1;\n\n  --ok-indigo:    #3B4FE0;\n  --ok-indigo-2:  #5A6CFF;\n  --ok-green:     #2E8E73;\n  --ok-green-2:   #1E6E58;\n  --ok-red:       #D14343;\n  --ok-red-2:     #B83838;\n  --ok-purple:    #6B4BC4;\n  --ok-purple-2:  #4F36A1;\n  --ok-orange:    #E78A21;\n  --ok-orange-2:  #D97516;\n  --ok-cream:     #FBE7CF;\n}\n\n/* ============================================================\n   1) Phone bezel + screen tweaks (override scrollytelling-v4.css)\n   ============================================================ */\n.pt-phone {\n  width: clamp(300px, 26vw, 360px) !important;\n  border-radius: 56px !important;\n  padding: 11px !important;\n}\n.pt-phone-screen {\n  border-radius: 48px !important;\n  aspect-ratio: 320 / 660;\n  background: var(--ok-bg) !important;\n  position: relative;\n}\n/* Drop the dynamic island (we have a real app header instead) */\n.pt-statusbar { display: none !important; }\n.pt-phone-screen::before { display: none !important; }\n\n/* Scenes start below the app header, end above the tab bar */\n.pt-scenes {\n  inset: 64px 0 64px !important;\n  padding: 14px 18px 8px !important;\n  overflow: hidden;\n}\n.pt-scene {\n  padding: 0 !important;\n  gap: 11px !important;\n}\n\n/* ============================================================\n   2) APP HEADER\n   ============================================================ */\n.pt-app-head {\n  position: absolute;\n  inset: 0 0 auto 0;\n  height: 60px;\n  z-index: 8;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 14px 18px 6px;\n  background: var(--ok-bg);\n}\n.ah-cell {\n  position: relative;\n  flex: none;\n  width: 38px; height: 38px;\n  border-radius: 14px;\n  background: #fff;\n  border: 1px solid var(--ok-line);\n  box-shadow: 0 2px 6px -3px rgba(15,15,20,.10);\n  display: grid; place-items: center;\n  color: var(--ok-text);\n}\n.ah-cell svg { width: 17px; height: 17px; stroke-width: 2; }\n.ah-bell { color: var(--ok-text); }\n.ah-badge {\n  position: absolute;\n  top: -4px; right: -4px;\n  min-width: 18px; height: 18px;\n  border-radius: 9px;\n  background: #E03B3B;\n  color: #fff;\n  font-size: 10px; font-weight: 800;\n  display: grid; place-items: center;\n  padding: 0 4px;\n  box-shadow: 0 0 0 1.5px var(--ok-bg);\n}\n.ah-brand {\n  font-size: 18px; font-weight: 800; letter-spacing: -.02em;\n  color: var(--ok-text);\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 0 6px 0 4px;\n}\n.ah-brand .ah-dot {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--ok-indigo);\n  display: inline-block;\n}\n.ah-actions {\n  margin-left: auto;\n  display: flex; align-items: center; gap: 6px;\n}\n\n/* ============================================================\n   3) TAB BAR (5 tabs + central Ok чат)\n   ============================================================ */\n.pt-tabbar.pt-tabbar-app {\n  height: 64px !important;\n  background: #fff !important;\n  backdrop-filter: none !important;\n  border-top: 1px solid var(--ok-line);\n  padding: 6px 8px 8px !important;\n}\n.pt-tabbar.pt-tabbar-app .pt-tab {\n  display: flex; flex-direction: column; align-items: center;\n  gap: 3px;\n  font-size: 10.5px; font-weight: 600; color: var(--ok-muted);\n  background: none; border: 0; padding: 0;\n  flex: 1; min-width: 0;\n}\n.pt-tabbar.pt-tabbar-app .pt-tab svg {\n  width: 22px; height: 22px;\n  stroke-width: 2;\n  color: var(--ok-muted);\n}\n.pt-tabbar.pt-tabbar-app .pt-tab.on { color: var(--ok-indigo); }\n.pt-tabbar.pt-tabbar-app .pt-tab.on svg { color: var(--ok-indigo); }\n.pt-tabbar.pt-tabbar-app .pt-tab[data-tab=\"search\"].on,\n.pt-tabbar.pt-tabbar-app .pt-tab[data-tab=\"search\"].on svg { color: var(--ok-indigo); }\n/* underline for active tab */\n.pt-tabbar.pt-tabbar-app .pt-tab.on::after {\n  content: \"\";\n  position: absolute;\n  bottom: 2px;\n  width: 22px; height: 2px;\n  border-radius: 2px;\n  background: var(--ok-indigo);\n}\n.pt-tabbar.pt-tabbar-app .pt-tab { position: relative; }\n\n.pt-tabbar.pt-tabbar-app .pt-tab-ok {\n  flex: none;\n  width: 52px; height: 52px; border-radius: 50%;\n  background: var(--ok-indigo) !important;\n  color: #fff;\n  display: flex; flex-direction: column; align-items: center; justify-content: center;\n  gap: 1px;\n  margin-top: -22px !important;\n  border: 4px solid #fff;\n  box-shadow: 0 8px 18px -4px rgba(59,79,224,.55) !important;\n  font-family: inherit;\n  font-weight: 800;\n  line-height: 1;\n  padding: 0;\n  cursor: pointer;\n}\n.pt-tabbar.pt-tabbar-app .pt-tab-ok .okt-line  { font-size: 14px; }\n.pt-tabbar.pt-tabbar-app .pt-tab-ok .okt-line2 { font-size: 9.5px; font-weight: 600; opacity: .92; }\n\n/* Home indicator */\n.pt-tabbar.pt-tabbar-app::after {\n  width: 30% !important;\n  height: 3.5px !important;\n  bottom: 4px !important;\n  background: rgba(15,15,20,.45) !important;\n  opacity: .50 !important;\n}\n\n/* ============================================================\n   4) HERO CARDS — gradient blocks at top of each section\n   ============================================================ */\n.okhero {\n  border-radius: 22px;\n  padding: 14px 16px 14px;\n  color: #fff;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n  /* uniform size for every section's main hero */\n  min-height: 148px;\n  display: flex; flex-direction: column;\n  justify-content: center; gap: 2px;\n}\n.okhero-indigo { background: linear-gradient(155deg, #4B5EFF 0%, #3543CC 100%); }\n.okhero-green  { background: linear-gradient(155deg, #2E8E73 0%, #14543F 100%); }\n.okhero-red    { background: linear-gradient(155deg, #E45050 0%, #B22B2B 100%); }\n.okhero-purple { background: linear-gradient(155deg, #6F4FD0 0%, #4525A0 100%); }\n.okhero-dark   { background: linear-gradient(155deg, #1F1F26 0%, #16161A 100%); }\n\n.okhero-eyebrow {\n  font-size: 10px; font-weight: 700;\n  letter-spacing: .14em; text-transform: uppercase;\n  opacity: .82;\n}\n.okhero-title {\n  font-size: 18px; font-weight: 800;\n  letter-spacing: -.02em;\n  margin-top: 2px;\n  line-height: 1.15;\n}\n.okhero-sub {\n  font-size: 11.5px; opacity: .82; font-weight: 500;\n  margin-top: 4px;\n}\n.okhero-btn {\n  display: flex; align-items: center; justify-content: center;\n  gap: 8px;\n  width: 100%;\n  margin-top: 12px;\n  padding: 11px 14px;\n  background: rgba(255,255,255,.18);\n  border: 1px solid rgba(255,255,255,.10);\n  border-radius: 14px;\n  color: #fff;\n  font-size: 13.5px; font-weight: 700;\n  position: relative;\n  font-family: inherit;\n  cursor: pointer;\n}\n.okhero-btn svg { width: 16px; height: 16px; }\n.okhero-btn-arr { margin-left: auto; }\n.okhero-btn-dark { background: rgba(255,255,255,.10); }\n\n.okhero-compact { padding: 10px 14px 12px; min-height: 0; gap: 1px; }\n.okhero-compact .okhero-title { font-size: 16px; }\n\n/* Stats pills inside hero (used by Поиск) */\n.okhero-stats {\n  display: flex; gap: 8px; margin-top: 10px;\n  justify-content: center;\n}\n.okhs-cell {\n  background: rgba(255,255,255,.12);\n  border-radius: 13px;\n  padding: 7px 16px;\n  min-width: 72px;\n}\n.okhs-cell b { display: block; font-size: 16px; font-weight: 800; }\n.okhs-cell span { display: block; font-size: 10.5px; opacity: .8; }\n\n/* ============================================================\n   5) TILE GRID\n   ============================================================ */\n.ok-tilegrid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 8px;\n}\n.ok-tile {\n  display: flex; align-items: center; gap: 9px;\n  background: #fff;\n  border-radius: 14px;\n  border: 1px solid var(--ok-line);\n  padding: 10px 11px;\n  min-height: 56px;\n  position: relative;\n}\n.ok-tile-ico {\n  flex: none;\n  width: 32px; height: 32px;\n  border-radius: 9px;\n  display: grid; place-items: center;\n}\n.ok-tile-ico svg { width: 17px; height: 17px; stroke-width: 2; }\n.ok-ti-indigo {\n  background: rgba(91,107,235,.12);\n  color: #5B6BEB;\n}\n.ok-ti-green {\n  background: rgba(46,142,115,.12);\n  color: var(--ok-green);\n}\n.ok-tile-text {\n  display: flex; flex-direction: column; gap: 1px; min-width: 0;\n}\n.ok-tile-lbl {\n  font-size: 11px; color: var(--ok-muted); font-weight: 600;\n}\n.ok-tile-val {\n  font-size: 14px; font-weight: 800; color: var(--ok-text);\n  letter-spacing: -.01em;\n}\n.ok-tile-unit {\n  font-size: 9.5px; color: var(--ok-muted);\n}\n.ok-tile-chev {\n  margin-left: auto;\n  width: 14px !important; height: 14px !important;\n  color: var(--ok-fadetext);\n  flex: none;\n}\n.ok-tile-wide {\n  background: linear-gradient(165deg, #E6F2EC, #D6EDE0);\n  border-color: rgba(46,142,115,.18);\n}\n\n/* ============================================================\n   6) DETAIL HEAD (back ▸ title ▸ right tab)\n   ============================================================ */\n.ok-detail-head {\n  display: flex; align-items: center; gap: 10px;\n  padding: 0 2px;\n}\n.ok-detail-head h4 {\n  font-size: 17px; font-weight: 800;\n  color: var(--ok-text); letter-spacing: -.02em;\n  margin: 0;\n}\n.ok-detail-tab {\n  margin-left: auto;\n  font-size: 12px; color: var(--ok-fadetext); font-weight: 500;\n}\n.ok-back 3>\n        <p>Давление, пульс, сахар, вес и лекарства. Сравнивает с вашей личной нормой и напоминает о приёме вовремя.<\u002Fp>\n        <div class=\"fc-mock\">\n          <div class=\"row\"><i data-lucide=\"activity\"><\u002Fi>Давление 135/85<\u002Fdiv>\n          <div class=\"row\"><i data-lucide=\"bell-ring\"><\u002Fi>Напоминание: таблетки<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"feat-card fc-search\">\n        <span class=\"fc-ico\"><i data-lucide=\"search\"><\u002Fi><\u002Fspan>\n        <div class=\"fc-tag\">Найти<\u002Fdiv>\n        <h3>Поиск<\u002Fh3>\n        <p>Куда сходить, что купить, где дешевле. Ищите событие, товар или услугу — текстом, голосом или по фото.<\u002Fp>\n        <div class=\"fc-mock\">\n          <div class=\"row\"><i data-lucide=\"mic\"><\u002Fi>«Куда сходить на выходных»<\u002Fdiv>\n          <div class=\"row\"><i data-lucide=\"list-checks\"><\u002Fi>Подобрано 5 вариантов<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"feat-card fc-scam\">\n        <span class=\"fc-ico\"><i data-lucide=\"shield-alert\"><\u002Fi><\u002Fspan>\n        <div class=\"fc-tag\">Защита<\u002Fdiv>\n        <h3>Стоп Мошенник<\u002Fh3>\n        <p>Проверяет СМС, письма, ссылки и звонки. Двухэтапный анализ выдаёт вердикт: опасно, подозрительно или безопасно.<\u002Fp>\n        <div class=\"fc-mock\">\n          <div class=\"row\"><i data-lucide=\"scan-search\"><\u002Fi>Анализ: читаю → думаю<\u002Fdiv>\n          <div class=\"row\"><i data-lucide=\"octagon-alert\"><\u002Fi>Вердикт: Опасно<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"feat-card fc-news\">\n        <span class=\"fc-ico\"><i data-lucide=\"newspaper\"><\u002Fi><\u002Fspan>\n        <div class=\"fc-tag\">В курсе<\u002Fdiv>\n        <h3>Новости<\u002Fh3>\n        <p>Только официальные источники: МВД, СФР, ЦБ, Минздрав, Госуслуги. Кнопка «Объясни просто» и озвучка вслух.<\u002Fp>\n        <div class=\"fc-mock\">\n          <div class=\"row\"><i data-lucide=\"landmark\"><\u002Fi>Новое от СФР: выплаты<\u002Fdiv>\n          <div class=\"row\"><i data-lucide=\"volume-2\"><\u002Fi>Слушать вслух<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <\u002Fdiv><\u002Fdiv>\n\n      <div class=\"arc-dots\" id=\"arcDots\"><\u002Fdiv>\n      <div class=\"arc-hint\"><i data-lucide=\"move-horizontal\"><\u002Fi>Свайп влево-вправо или нажмите на точку<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= KNOWLEDGE BASE ================= -->\n<section class=\"section-pad\" id=\"profile\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"kb\">\n      <div class=\"wrap kb-grid\" style=\"padding-block:clamp(40px,6vw,72px)\">\n        <div>\n          <span class=\"eyebrow\">База знаний о вас<\u002Fspan>\n          <h2 style=\"margin:18px 0 16px\">Заполняете профиль — и приложение знает вас так, как не знают даже близкие<\u002Fh2>\n          <p class=\"lead\">Один раз расскажите о себе: рабочее давление, привычные лекарства, категории расходов, ваш город. Дальше каждый ответ — про вас лично, а не общая справка из интернета. Чем больше OkTolk знает — тем точнее помогает.<\u002Fp>\n          <div class=\"kb-quote\"><i data-lucide=\"lock\"><\u002Fi>Эти данные хранятся на российских серверах и видны только вам<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div class=\"kb-card reveal\">\n            <div class=\"kb-card-head\"><span class=\"kbh-ico\"><i data-lucide=\"id-card\"><\u002Fi><\u002Fspan>Что знает о вас OkTolk<\u002Fdiv>\n            <p class=\"kb-card-sub\">Вы заполняете — приложение запоминает<\u002Fp>\n            <div class=\"kb-rows\">\n              <div class=\"kb-row\">\n                <span class=\"kb-ico\"><i data-lucide=\"heart-pulse\"><\u002Fi><\u002Fspan>\n                <div><div class=\"kb-lbl\">Рабочее давление и пульс<\u002Fdiv><div class=\"kb-val\">120/80 · 70 уд/мин<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"kb-row\">\n                <span class=\"kb-ico\"><i data-lucide=\"pill\"><\u002Fi><\u002Fspan>\n                <div><div class=\"kb-lbl\">Привычные лекарства<\u002Fdiv><div class=\"kb-tags\"><span class=\"kb-tag\">Эналаприл 10 мг<\u002Fspan><span class=\"kb-tag\">Аторвастатин 20 мг<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"kb-row\">\n                <span class=\"kb-ico\"><i data-lucide=\"wallet\"><\u002Fi><\u002Fspan>\n                <div><div class=\"kb-lbl\">Категории расходов<\u002Fdiv><div class=\"kb-tags\"><span class=\"kb-tag\">ЖКУ<\u002Fspan><span class=\"kb-tag\">Льготные лекарства<\u002Fspan><span class=\"kb-tag\">Транспорт<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"kb-row\">\n                <span class=\"kb-ico\"><i data-lucide=\"map-pin\"><\u002Fi><\u002Fspan>\n                <div><div class=\"kb-lbl\">Город и часовой пояс<\u002Fdiv><div class=\"kb-val\">Новосибирск · напоминания по местному времени<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"kb-add\"><i data-lucide=\"plus\"><\u002Fi>Добавить ещё о себе<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"kb-chat reveal d1\">\n            <span class=\"kb-chip-ctx\"><i data-lucide=\"sparkles\"><\u002Fi>Ответ с учётом вашего профиля<\u002Fspan>\n            <div class=\"kb-chat-flow\">\n              <div class=\"kb-bubble me\">Давление 138 на 90, что делать?<\u002Fdiv>\n              <div class=\"kb-bubble bot\">Для вас это выше обычного: ваше рабочее давление <b>120/80<\u002Fb>, сейчас на <b>18 единиц<\u002Fb> больше. Отдохните, не пейте кофе и измерьте ещё раз через час. Если останется высоким — это повод показаться врачу.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======= ss=\"med-check\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>\n              <div><div class=\"m-t\">Аторвастатин<\u002Fdiv><div class=\"m-s\">20 мг · после ужина<\u002Fdiv><\u002Fdiv>\n              <span class=\"med-time\">21:00<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"med-card\" style=\"margin-top:10px;opacity:.7\">\n              <span class=\"med-check\" style=\"background:rgba(255,255,255,.18)\"><i data-lucide=\"clock\"><\u002Fi><\u002Fspan>\n              <div><div class=\"m-t\">Эналаприл<\u002Fdiv><div class=\"m-s\">10 мг · утром<\u002Fdiv><\u002Fdiv>\n              <span class=\"med-time\">9:00<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;color:rgba(255,255,255,.6);text-align:center\">OkTolk не заменяет врача — он анализирует данные, но не ставит диагнозы.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FINANCE ================= -->\n<section class=\"section-pad\" id=\"finance\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"finance-sec\">\n      <div class=\"wrap fin-grid\" style=\"padding-block:clamp(40px,6vw,72px)\">\n        <div>\n          <span class=\"eyebrow\">Как работает Финансы<\u002Fspan>\n          <h2 style=\"margin:18px 0 16px\">Записал расход за 3 секунды — и видно, куда уходят деньги<\u002Fh2>\n          <p class=\"lead\">Скажите голосом, сфотографируйте чек или напишите коротко — OkTolk сам определит сумму и категорию. Никаких таблиц и Excel.<\u002Fp>\n          <div class=\"fin-ways\">\n            <div class=\"fin-way\"><span class=\"fw-ico\"><i data-lucide=\"mic\"><\u002Fi><\u002Fspan><div><div class=\"fw-t\">«Купил продукты на 1 240»<\u002Fdiv><div class=\"fw-s\">Голосом — за секунду<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"fin-way\"><span class=\"fw-ico\"><i data-lucide=\"camera\"><\u002Fi><\u002Fspan><div><div class=\"fw-t\">Фото чека<\u002Fdiv
