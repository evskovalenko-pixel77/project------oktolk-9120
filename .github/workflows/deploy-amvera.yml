name: Deploy to Amvera

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo (source content)
        uses: actions/checkout@v4
        with:
          path: gh_src

      - name: Sync content to Amvera and push (fast-forward)
        env:
          AMVERA_USER: ${{ secrets.AMVERA_USER }}
          AMVERA_PASS: ${{ secrets.AMVERA_PASS }}
        run: |
          set -e
          ENC=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['AMVERA_PASS'],safe=''))")
          AMVERA_URL="https://${AMVERA_USER}:${ENC}@git.msk0.amvera.ru/${AMVERA_USER}/oktolk.git"

          # Клонируем текущий Amvera-репозиторий (сохраняем его историю)
          git clone "$AMVERA_URL" amvera_repo
          cd amvera_repo
          git config user.email "ci@oktolk.ru"
          git config user.name "GitHub CI"

          # Синхронизируем содержимое из GitHub (кроме .git и самих workflow)
          rsync -a --delete --exclude='.git' ../gh_src/ ./

          # Коммитим и пушим обычным fast-forward → Amvera видит новый коммит → собирает
          git add -A
          if git diff --cached --quiet; then
            echo "Нет изменений для деплоя"
          else
            git commit -m "deploy: sync from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin master
            echo "✅ Запушено на Amvera (fast-forward) — сборка стартует"
          fi
