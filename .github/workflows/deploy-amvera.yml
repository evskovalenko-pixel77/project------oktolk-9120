name: Deploy to Amvera

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo (source content)
        uses: actions/checkout@v4
        with:
          path: gh_src

      - name: Sync content to Amvera and push (fast-forward)
        env:
          AMVERA_USER: ${{ secrets.AMVERA_USER }}
          AMVERA_PASS: ${{ secrets.AMVERA_PASS }}
        run: |
          set -e
          # Рабочий способ авторизации — credential helper (НЕ креды в URL)
          git config --global credential.helper store
          python3 -c "
          import urllib.parse, os
          u = os.environ['AMVERA_USER']
          p = urllib.parse.quote(os.environ['AMVERA_PASS'], safe='')
          with open(os.path.expanduser('~/.git-credentials'),'w') as f:
              f.write(f'https://{u}:{p}@git.msk0.amvera.ru\n')
          "
          git config --global user.email "ci@oktolk.ru"
          git config --global user.name "GitHub CI"

          # Клонируем текущий Amvera-репо (без кредов в URL — берутся из helper)
          git clone https://git.msk0.amvera.ru/kes/oktolk.git amvera_repo
          cd amvera_repo

          # Синхронизируем содержимое из GitHub (кроме .git)
          rsync -a --delete --exclude='.git' ../gh_src/ ./

          # Fast-forward коммит → Amvera видит новый коммит → собирает
          git add -A
          if git diff --cached --quiet; then
            echo "Нет изменений для деплоя"
          else
            git commit -m "deploy: sync from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin master
            echo "Запушено на Amvera (fast-forward) — сборка стартует"
          fi
          rm -f ~/.git-credentials
