name: Deploy to Amvera

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AMVERA_USER: ${{ secrets.AMVERA_USER }}
      AMVERA_PASS: ${{ secrets.AMVERA_PASS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Amvera
        run: |
          python3 -c "
          import urllib.parse, os, subprocess
          user = os.environ['AMVERA_USER']
          pwd = urllib.parse.quote(os.environ['AMVERA_PASS'], safe='')
          url = f'https://{user}:{pwd}@git.msk0.amvera.ru/{user}/oktolk.git'
          subprocess.run(['git', 'remote', 'add', 'amvera', url], check=True)
          " 
          git push amvera HEAD:master --force
